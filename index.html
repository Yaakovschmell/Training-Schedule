<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coaching Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg-dark:#f5efe3;--bg-grad1:#ede4d3;--bg-grad2:#f5efe3;
--bg-card:#fdfaf5;--bg-hover:#ede4d3;--border:#d4c9b4;
--text:#0d1a12;--text-dim:#6a8a74;
--accent:#c9933a;--accent-light:#e8b96a;--accent-dark:#a67220;
--teal:#5a8a6a;--green:#5a8a6a;--red:#c23b2a;--blue:#2d6a8a;
--purple:#7a5a8a;--amber:#c9933a;--pink:#c23b2a;
--forest:#0d2b1e;--forest2:#143324;--cream:#f5efe3;
}
html,body{height:100%;margin:0;padding:0;background:var(--cream);color:var(--text);font-family:'Outfit',sans-serif;font-size:16px;line-height:1.7;overflow:hidden}
body{background:var(--cream)}
.app{display:flex;height:100vh;flex-direction:column}
.header{height:60px;background:linear-gradient(135deg,var(--forest),var(--forest2));backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;justify-content:space-between}
.logo{font-size:19px;font-weight:700;letter-spacing:.5px;color:var(--accent-light);display:flex;align-items:center;gap:8px}
.logo::before{content:"";width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px rgba(201,147,58,.5)}
.nav-dots{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.nav-btn{background:none;border:none;color:rgba(245,239,227,.7);font-size:12px;padding:6px 12px;cursor:pointer;border-radius:6px;transition:all .2s;font-family:'IBM Plex Mono',monospace;font-weight:500}
.nav-btn:hover{background:rgba(255,255,255,.1);color:var(--accent-light)}
.nav-btn.active{color:#fff;background:linear-gradient(120deg,var(--accent),var(--accent-dark));box-shadow:0 2px 10px rgba(201,147,58,.35)}
.save-ind{font-size:10px;color:rgba(245,239,227,.6);font-family:'IBM Plex Mono',monospace}
.data-controls{display:flex;gap:8px}
.data-btn{background:rgba(255,255,255,.15);border:none;color:rgba(245,239,227,.8);font-size:11px;padding:6px 10px;border-radius:6px;cursor:pointer;transition:all .2s;font-family:'IBM Plex Mono',monospace}
.data-btn:hover{background:var(--accent);color:#fff}
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:180px;background:linear-gradient(180deg,#ede4d3,#e3d7c4);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;flex-shrink:0}
.sidebar-section{padding:12px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);border-bottom:1px solid var(--border);margin-bottom:4px}
.sidebar-item{padding:10px 16px;font-size:13px;cursor:pointer;color:var(--text-dim);transition:all .15s;border-left:3px solid transparent;display:flex;align-items:center;justify-content:space-between}
.sidebar-item:hover{background:var(--bg-hover);color:var(--text);border-left-color:rgba(91,141,239,.4)}
.sidebar-item.active{border-left-color:var(--accent);color:var(--accent-dark);background:linear-gradient(90deg,rgba(201,147,58,.15),transparent)}
.sidebar-add{color:var(--accent);border-left-color:var(--accent);margin-top:8px}
.sidebar-count{font-size:10px;background:linear-gradient(120deg,var(--accent),var(--teal));color:#fff;padding:1px 7px;border-radius:10px;font-weight:700}
.content{flex:1;overflow-y:auto;padding:28px 36px}
.card{background:linear-gradient(160deg,#fdfaf5,#f5efe3);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:border-color .2s}
.card:hover{border-color:rgba(201,147,58,.4)}
.date-group-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:linear-gradient(90deg,rgba(201,147,58,.12),transparent);border-radius:10px;cursor:pointer;user-select:none}
.date-group-header:hover{background:linear-gradient(90deg,rgba(201,147,58,.2),transparent)}
.date-group-label{font-size:13px;font-weight:700;color:var(--accent-dark);letter-spacing:.3px}
.date-group-toggle{font-size:12px;color:var(--text-dim);transition:transform .2s;display:inline-block}
.date-group-body{max-height:2000px;transition:max-height .3s ease,opacity .3s ease;overflow:hidden;opacity:1}
.date-group-body.collapsed{max-height:0!important;opacity:0}
.edit-note-area{width:100%;min-height:80px;padding:8px 10px;background:#fffdf7;border:1.5px solid var(--accent);border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;line-height:1.6;resize:vertical}
.edit-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font-size:11px;padding:3px 9px;border-radius:6px;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .15s}
.edit-btn:hover{border-color:var(--accent);color:var(--accent)}
.save-edit-btn{background:linear-gradient(120deg,var(--accent),var(--accent-dark));color:#fff;border:none;font-size:11px;padding:4px 12px;border-radius:6px;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .15s;margin-right:6px}
.cancel-edit-btn{background:var(--bg-hover);color:var(--text-dim);border:1px solid var(--border);font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:'IBM Plex Mono',monospace}
.card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px;padding-left:11px;position:relative;cursor:pointer;user-select:none}
.card-title::before{content:"";position:absolute;left:0;top:2px;bottom:2px;width:3px;border-radius:3px;background:linear-gradient(180deg,var(--accent),var(--teal));}
.card-title-toggle{font-size:12px;color:var(--text-dim);transition:transform .2s;display:inline-block;margin-left:auto}
.card-content{max-height:2000px;transition:max-height .3s ease,opacity .3s ease;overflow:hidden;opacity:1}
.card-content.collapsed{max-height:0!important;opacity:0}
.split-section{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:1000px){.split-section{grid-template-columns:1fr}}
input[type=text],input[type=date],input[type=time],textarea,select{width:100%;padding:10px 12px;background:#fdfaf5;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
.btn-primary{padding:10px 16px;background:linear-gradient(120deg,var(--accent),var(--accent-dark));color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;transition:all .2s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,147,58,.35)}
.btn-secondary{padding:9px 14px;background:var(--bg-hover);color:var(--text);border:1px solid var(--border);border-radius:10px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px;transition:all .15s}
.btn-secondary:hover{background:var(--border);border-color:rgba(201,147,58,.3)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#a85656}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fdfaf5;border:1px solid var(--border);border-radius:14px;padding:24px;width:600px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.4);max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--accent-light)}
.modal-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);display:block;margin-bottom:6px;margin-top:12px}
.modal-label:first-of-type{margin-top:0}
.modal-buttons{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.empty-state{text-align:center;padding:20px;color:var(--text-dim);font-size:13px}
.del-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:4px 8px;border-radius:4px;transition:all .15s;flex-shrink:0}
.del-btn:hover{color:var(--red);background:rgba(201,112,112,.1)}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-month-label{font-size:18px;font-weight:700;color:var(--accent-light)}
.cal-nav-btns{display:flex;gap:8px}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
.cal-weekday{text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);padding:4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-cell{min-height:80px;background:#fdfaf5;border:1px solid var(--border);border-radius:8px;padding:6px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:3px;overflow:hidden}
.cal-cell:hover{border-color:var(--accent)}
.cal-cell.empty{background:transparent;border:none;cursor:default}
.cal-cell.today{border-color:var(--accent);background:linear-gradient(160deg,rgba(201,147,58,.18),transparent)}
.cal-cell.has-activity{background:linear-gradient(160deg,rgba(90,138,106,.15),transparent)}
.cal-cell.selected{border-color:var(--accent);border-width:2px}
.cal-day-num{font-size:12px;font-weight:700;color:var(--text)}
.cal-names{font-size:9px;color:var(--teal);line-height:1.3;word-break:break-word}
.cal-yaakov-tag{font-size:8px;color:var(--amber);font-weight:700}
.day-detail{margin-top:20px}
.day-card{background:#fdfaf5;border:1px solid var(--border);border-radius:12px;padding:20px}
.day-date{font-size:17px;font-weight:700;color:var(--accent-light);margin-bottom:14px}
.day-section{margin-bottom:16px}
.day-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);margin-bottom:8px}
.item-row{background:rgba(245,239,227,.8);padding:13px;border-radius:10px;margin-bottom:8px;font-size:12px;line-height:1.5;border-left:3px solid var(--accent);display:flex;justify-content:space-between;gap:8px}
.item-row:hover{background:rgba(237,228,211,.9)}
.item-row.blue{border-left-color:var(--blue)}
.item-row.green{border-left-color:var(--green)}
.item-body{flex:1;min-width:0}
.item-meta{font-size:10px;color:var(--text-dim);margin-bottom:4px}
.note-date{font-size:10px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;margin-bottom:4px}
.quick-btn{position:fixed;bottom:24px;right:24px;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--teal));color:#fff;border:none;font-size:28px;cursor:pointer;transition:all .2s;box-shadow:0 4px 15px rgba(201,147,58,.3)}
.quick-btn:hover{transform:scale(1.12) rotate(90deg);box-shadow:0 8px 30px rgba(90,138,106,.5)}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg-dark)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.badge{display:inline-block;font-size:10px;background:var(--border);color:var(--text-dim);padding:2px 7px;border-radius:10px;font-weight:600;margin-left:6px}
.badge.amber{background:linear-gradient(120deg,var(--accent),var(--accent-dark));color:#fff}
.badge.red{background:var(--red);color:#fff}
h1.page-title{font-size:27px;font-weight:700;margin-bottom:24px;color:var(--forest);letter-spacing:-.5px}
.sched-date-nav{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.sched-date-label{font-size:20px;font-weight:700;color:var(--accent-light);min-width:160px}
.sched-entry{background:#fdfaf5;border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;transition:border-color .2s}
.sched-entry:hover{border-color:rgba(201,147,58,.5)}
.sched-entry.type-meeting{border-left:4px solid var(--blue)}
.sched-entry.type-task{border-left:4px solid var(--teal)}
.sched-entry.done-entry{opacity:.6}
.sched-time{font-size:13px;font-weight:700;color:var(--accent);font-family:'IBM Plex Mono',monospace;min-width:52px;padding-top:2px}
.sched-body{flex:1;min-width:0}
.sched-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.sched-title.done-text{text-decoration:line-through;color:var(--text-dim)}
.sched-who{font-size:12px;color:var(--blue);margin-bottom:3px}
.sched-note{font-size:12px;color:var(--text-dim);line-height:1.5;margin-top:4px;white-space:pre-wrap}
.sched-type-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600;margin-right:6px}
.sched-type-badge.meeting{background:rgba(45,106,138,.15);color:var(--blue)}
.sched-type-badge.task{background:rgba(90,138,106,.15);color:var(--teal)}
.sched-actions{display:flex;gap:4px;flex-shrink:0;padding-top:2px}
.sched-cb{width:20px;height:20px;border:2px solid var(--border);border-radius:5px;background:#fdfaf5;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px}
.sched-cb:hover{border-color:var(--teal)}
.sched-cb.checked{background:linear-gradient(135deg,var(--green),var(--teal));border-color:var(--green)}
.sched-cb.checked::after{content:'\2713';color:#fff;font-size:11px;font-weight:700}
.sched-empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:14px}
.sched-section-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);padding:8px 0 6px;border-bottom:1px solid var(--border);margin-bottom:10px}
.cr-lead{background:#fdfaf5;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;transition:border-color .2s}
.cr-lead:hover{border-color:rgba(201,147,58,.4)}
.cr-lead.reviewed{opacity:.55;border-color:rgba(90,138,106,.35);background:rgba(90,138,106,.05)}
.cr-cb{width:20px;height:20px;border:2px solid var(--border);border-radius:5px;background:#fdfaf5;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px}
.cr-cb:hover{border-color:var(--teal)}
.cr-cb.checked{background:linear-gradient(135deg,var(--green),var(--teal));border-color:var(--green)}
.cr-cb.checked::after{content:'\2713';color:#fff;font-size:11px;font-weight:700}
.cr-lead-body{flex:1;min-width:0}
.cr-lead-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.cr-lead-name.reviewed-text{text-decoration:line-through;color:var(--text-dim)}
.cr-lead-meta{font-size:11px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;margin-bottom:4px}
.cr-lead-note{font-size:12px;color:var(--text);line-height:1.55;background:rgba(201,147,58,.07);border-left:3px solid var(--accent);padding:6px 10px;border-radius:0 6px 6px 0;white-space:pre-wrap;margin-top:4px}
.cr-actions{display:flex;gap:4px;flex-shrink:0;padding-top:2px}
</style>
</head>
<body>
<div class="app">
<div class="header">
<div class="logo">coaching hub</div>
<div style="display:flex;align-items:center;gap:16px">
<div class="nav-dots" id="nav-buttons"></div>
<div class="save-ind" id="save-indicator">saved</div>
<div class="data-controls">
<button class="data-btn" onclick="exportData()" title="Download your data">&#8595; export</button>
<button class="data-btn" onclick="openImportModal()" title="Load data from file">&#8593; import</button>
</div>
</div>
</div>
<div class="main">
<div class="sidebar" id="sidebar"></div>
<div class="content" id="content"></div>
</div>
</div>
<!-- YAAKOV MODAL -->
<div class="modal-overlay" id="yaakov-modal">
<div class="modal-box">
<div class="modal-title">&#127919; Yaakov Meeting</div>
<p style="font-size:12px;color:var(--text-dim);margin-bottom:14px">Log direction from Yaakov anytime during the day</p>
<label class="modal-label">Date</label>
<input type="date" id="m-yak-date">
<label class="modal-label">Time (optional)</label>
<input type="time" id="m-yak-time">
<label class="modal-label">What Yaakov said / direction</label>
<textarea id="m-yak-notes" placeholder="Who to focus on? What does he want done? Any issues?"></textarea>
<label class="modal-label">Trainees mentioned (optional)</label>
<input type="text" id="m-yak-trainees" placeholder="Cameron, Joshua, Astra">
<div class="modal-buttons">
<button class="btn-secondary" onclick="closeYaakovModal()">cancel</button>
<button class="btn-primary" onclick="saveYaakovMeeting()">log it</button>
</div>
</div>
</div>

<!-- COACHING NOTE MODAL -->
<div class="modal-overlay" id="coachnote-modal">
<div class="modal-box">
<div class="modal-title">&#128203; Add Coaching Note</div>
<label class="modal-label">Date</label>
<input type="date" id="m-cn-date">
<label class="modal-label">Notes</label>
<textarea id="m-cn-text" style="min-height:120px" placeholder="Coaching points, lead feedback, observations, action items..."></textarea>
<input type="hidden" id="m-cn-trainee-id">
<div class="modal-buttons">
<button class="btn-secondary" onclick="closeCoachNoteModal()">cancel</button>
<button class="btn-primary" onclick="saveCoachNote()">save note</button>
</div>
</div>
</div>

<!-- IMPORT MODAL -->
<div class="modal-overlay" id="import-modal">
<div class="modal-box">
<div class="modal-title">&#128229; Import Data</div>
<p style="font-size:12px;color:var(--text-dim);margin-bottom:16px">Select your saved data file (.json)</p>
<input type="file" id="import-file" accept=".json" style="width:100%;margin-bottom:16px;padding:8px;background:var(--bg-dark);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer">
<div class="modal-buttons">
<button class="btn-secondary" onclick="closeImportModal()">cancel</button>
<button class="btn-primary" onclick="importData()">import</button>
</div>
</div>
</div>

<!-- ADD TO SCHEDULE MODAL (for trainee quick-add from home) -->
<div class="modal-overlay" id="addtosched-modal">
<div class="modal-box">
<div class="modal-title" id="addtosched-modal-title">&#128197; Add to Schedule</div>
<label class="modal-label">Date</label>
<input type="date" id="m-ats-date">
<label class="modal-label">Time (optional)</label>
<input type="time" id="m-ats-time">
<label class="modal-label">Title / What</label>
<input type="text" id="m-ats-title" placeholder="e.g. Sales Training, Role Play, Check-in...">
<label class="modal-label">Notes (optional)</label>
<textarea id="m-ats-notes" style="min-height:80px" placeholder="Any details, agenda, prep needed..."></textarea>
<input type="hidden" id="m-ats-trainee-id">
<div class="modal-buttons">
<button class="btn-secondary" onclick="closeAddToSchedModal()">cancel</button>
<button class="btn-primary" onclick="saveAddToSched()">add to schedule</button>
</div>
</div>
</div>

<!-- CALL REVIEW MODAL (per trainee) -->
<div class="modal-overlay" id="cr-modal">
<div class="modal-box">
<div class="modal-title" id="cr-modal-title">&#128203; Add Lead to Review</div>
<label class="modal-label">Lead Name</label>
<input type="text" id="m-cr-name" placeholder="e.g. Sylvia Snowden, James Land...">
<label class="modal-label">Call Date &amp; Time (optional)</label>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
<input type="date" id="m-cr-date">
<input type="time" id="m-cr-time">
</div>
<label class="modal-label">Coaching Notes</label>
<textarea id="m-cr-note" style="min-height:110px" placeholder="e.g. no fu quoted June 10th, no text since the 9th, calls too short..."></textarea>
<input type="hidden" id="m-cr-edit-id" value="">
<input type="hidden" id="m-cr-trainee-id" value="">
<div class="modal-buttons">
<button class="btn-secondary" onclick="closeCrModal()">cancel</button>
<button class="btn-primary" onclick="saveCrLead()">save</button>
</div>
</div>
</div>

<!-- SCHEDULE ENTRY MODAL -->
<div class="modal-overlay" id="sched-modal">
<div class="modal-box">
<div class="modal-title" id="sched-modal-title">&#128197; Add Schedule Entry</div>
<label class="modal-label">Type</label>
<select id="m-sched-type">
<option value="meeting">&#129309; Meeting</option>
<option value="task">&#9989; Task / To-do</option>
</select>
<label class="modal-label">Date</label>
<input type="date" id="m-sched-date">
<label class="modal-label">Time (optional)</label>
<input type="time" id="m-sched-time">
<label class="modal-label" id="m-sched-title-label">Title / What</label>
<input type="text" id="m-sched-title" placeholder="e.g. Team check-in, Review proposals...">
<label class="modal-label" id="m-sched-who-label" style="display:block">Who (for meetings)</label>
<input type="text" id="m-sched-who" placeholder="e.g. Cameron, Joshua...">
<label class="modal-label">Notes (optional)</label>
<textarea id="m-sched-notes" style="min-height:80px" placeholder="Any details, agenda, prep needed..."></textarea>
<input type="hidden" id="m-sched-edit-id" value="">
<div class="modal-buttons">
<button class="btn-secondary" onclick="closeSchedModal()">cancel</button>
<button class="btn-primary" onclick="saveSchedEntry()">save</button>
</div>
</div>
</div>

<button class="quick-btn" onclick="openSchedModal('','');" title="Add to schedule">+</button><script>

STATE.trainees=o.trainees||[];STATE.meetings=o.meetings||[];STATE.yaakovMeetings=o.yaakovMeetings||[];
STATE.scheduleEntries=o.scheduleEntries||[];STATE.callReviews=o.callReviews||[];
STATE.noteId=o.noteId||1;STATE.traineeId=o.traineeId||1;
STATE.coachingNotes=[];
(o.notes||[]).forEach(function(n){STATE.coachingNotes.push({id:STATE.noteId++,traineeId:n.traineeId||null,dateKey:n.dateKey||TODAY,date:n.date||TODAY_DISPLAY,text:n.text||''});});
(o.dayNotes||[]).forEach(function(n){STATE.coachingNotes.push({id:STATE.noteId++,traineeId:n.traineeId||null,dateKey:n.dateKey||TODAY,date:n.date||TODAY_DISPLAY,text:n.text||''});});
(o.leadLogs||[]).forEach(function(n){STATE.coachingNotes.push({id:STATE.noteId++,traineeId:n.traineeId||null,dateKey:n.dateKey||TODAY,date:n.date||TODAY_DISPLAY,text:n.text||''});});
STATE.coachingNotes.sort(function(a,b){return b.dateKey.localeCompare(a.dateKey);});
}
}}catch(e){}
try{ const c=localStorage.getItem('coaching_collapsed'); if(c)collapsedSections=JSON.parse(c); }catch(e){}
STATE.trainees=STATE.trainees||[];STATE.meetings=STATE.meetings||[];STATE.yaakovMeetings=STATE.yaakovMeetings||[];
STATE.coachingNotes=STATE.coachingNotes||[];STATE.scheduleEntries=STATE.scheduleEntries||[];STATE.callReviews=STATE.callReviews||[];
if(!STATE.noteId)STATE.noteId=1; if(!STATE.traineeId)STATE.traineeId=1;
document.getElementById('save-indicator').textContent='loaded';
}

function save(){ try{localStorage.setItem('coaching_v8',JSON.stringify(STATE));localStorage.setItem('coaching_collapsed',JSON.stringify(collapsedSections));document.getElementById('save-indicator').textContent='saved';}catch(e){document.getElementById('save-indicator').textContent='error';}}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function dateOf(item){ if(item.dateKey){const[y,m,d]=item.dateKey.split('-').map(Number);return new Date(y,m-1,d);} const p=new Date(item.date); return isNaN(p)?null:p; }
function keyFromDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function traineeName(id){ const t=STATE.trainees.find(x=>x.id===id); return t?t.name:''; }
function fmtDate(key){ if(!key)return''; const[y,m,d]=key.split('-').map(Number); return MONTHS_FULL[m-1].slice(0,3)+' '+d; }
function fmtDateFull(key){ if(!key)return''; const[y,m,d]=key.split('-').map(Number); return MONTHS_FULL[m-1]+' '+d+', '+y; }
function fmtTime(t){ if(!t)return''; const[h,m]=t.split(':').map(Number); const ampm=h>=12?'pm':'am'; return ((h%12)||12)+':'+(m<10?'0':'')+m+' '+ampm; }

function toggleSection(id){

}
function updateSectionUI(id){

if(collapsedSections[id]){content.classList.add('collapsed');if(toggle)toggle.textContent='\u25B6';}

`<button class="nav-btn ${currentPage === i.id ? 'active' : ''}" onclick="showPage('${i.id}')">${i.label}</button>`

// SCHEDULE

return '<div class="sched-entry type-'+e.type+(isDone?' done-entry':'')+'" id="sched-entry-'+e.id+'">'+

(timeStr?'<div class="sched-time">'+esc(timeStr)+'</div>':'')+
'<div id="se-view-'+e.id+'">'+

(e.who&&e.type==='meeting'?'<div class="sched-who">\u{1F464} with: '+esc(e.who)+'</div>':'')+
(e.notes&&!compact?'<div class="sched-note">'+esc(e.notes)+'</div>':'')+
(e.notes&&compact?'<div class="sched-note" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:400px">'+esc(e.notes)+'</div>':'')+
'</div>'+

'</div>'+
'</div>'+

STATE.trainees=STATE.trainees||[];
STATE.meetings=STATE.meetings||[];
STATE.yaakovMeetings=STATE.yaakovMeetings||[];
if(!STATE.noteId)STATE.noteId=1;if(!STATE.traineeId)STATE.traineeId=1;
if((imported.notes||imported.dayNotes||imported.leadLogs)&&!imported.coachingNotes){
STATE.coachingNotes=[];
(imported.notes||[]).forEach(function(n){STATE.coachingNotes.push({id:STATE.noteId++,traineeId:n.traineeId||null,dateKey:n.dateKey||TODAY,date:n.date||TODAY_DISPLAY,text:n.text||''});});
(imported.dayNotes||[]).forEach(function(n){STATE.coachingNotes.push({id:STATE.noteId++,traineeId:n.traineeId||null,dateKey:n.dateKey||TODAY,date:n.date||TODAY_DISPLAY,text:n.text||''});});
(imported.leadLogs||[]).forEach(function(n){STATE.coachingNotes.push({id:STATE.noteId++,traineeId:n.traineeId||null,dateKey:n.dateKey||TODAY,date:n.date||TODAY_DISPLAY,text:n.text||''});});
}
localStorage.setItem('coaching_v8',JSON.stringify(STATE));
closeImportModal();showPage('home');updateNav();buildSidebar();
}catch(err){alert('Error importing file: '+err.message);}};
reader.readAsText(file);
}

function buildSidebar(){
const todaySched=STATE.scheduleEntries.filter(function(e){return e.dateKey===TODAY;}).length;
const sidebar=document.getElementById('sidebar');
sidebar.innerHTML='<div class="sidebar-section">Navigation</div>'+
'<div class="sidebar-item '+(currentPage==='home'?'active':'')+'" onclick="showPage(\'home\')">Home</div>'+
'<div class="sidebar-item '+(currentPage==='schedule'?'active':'')+'" onclick="showPage(\'schedule\')"><span>Schedule</span>'+(todaySched?'<span class="sidebar-count">'+todaySched+'</span>':'')+' </div>'+
'<div class="sidebar-item '+(currentPage==='calendar'?'active':'')+'" onclick="showPage(\'calendar\')">Calendar</div>'+
'<div class="sidebar-item '+(currentPage==='yaakov'?'active':'')+'" onclick="showPage(\'yaakov\')">Yaakov</div>'+
'<div class="sidebar-section" style="margin-top:16px">Trainees</div>'+
STATE.trainees.map(function(t){return '<div class="sidebar-item '+(currentPage==='trainee-'+t.id?'active':'')+'" onclick="showPage(\'trainee-'+t.id+'\')">'+esc(t.name)+'</div>';}).join('')+
'<div class="sidebar-item sidebar-add" onclick="addTrainee()">+ add trainee</div>';
}
load();buildSidebar();showPage('home');
window.addEventListener('beforeunload',save);
</script>
