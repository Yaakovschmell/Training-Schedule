<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coaching Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg-dark:#f5efe3;--bg-grad1:#ede4d3;--bg-grad2:#f5efe3;
--bg-card:#fdfaf5;--bg-hover:#ede4d3;--border:#d4c9b4;
--text:#0d1a12;--text-dim:#6a8a74;
--accent:#c9933a;--accent-light:#e8b96a;--accent-dark:#a67220;
--teal:#5a8a6a;--green:#5a8a6a;--red:#c23b2a;--blue:#2d6a8a;
--purple:#7a5a8a;--amber:#c9933a;--pink:#c23b2a;
--forest:#0d2b1e;--forest2:#143324;--cream:#f5efe3;
}
html,body{height:100%;margin:0;padding:0;background:var(--cream);color:var(--text);font-family:'Outfit',sans-serif;font-size:16px;line-height:1.7;overflow:hidden}
body{background:var(--cream)}
.app{display:flex;height:100vh;flex-direction:column}
.header{height:60px;background:linear-gradient(135deg,var(--forest),var(--forest2));backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;justify-content:space-between}
.logo{font-size:19px;font-weight:700;letter-spacing:.5px;color:var(--accent-light);display:flex;align-items:center;gap:8px}
.logo::before{content:"";width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px rgba(201,147,58,.5)}
.nav-dots{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.nav-btn{background:none;border:none;color:rgba(245,239,227,.7);font-size:12px;padding:6px 12px;cursor:pointer;border-radius:6px;transition:all .2s;font-family:'IBM Plex Mono',monospace;font-weight:500}
.nav-btn:hover{background:rgba(255,255,255,.1);color:var(--accent-light)}
.nav-btn.active{color:#fff;background:linear-gradient(120deg,var(--accent),var(--accent-dark));box-shadow:0 2px 10px rgba(201,147,58,.35)}
.save-ind{font-size:10px;color:rgba(245,239,227,.6);font-family:'IBM Plex Mono',monospace}
.data-controls{display:flex;gap:8px}
.data-btn{background:rgba(255,255,255,.15);border:none;color:rgba(245,239,227,.8);font-size:11px;padding:6px 10px;border-radius:6px;cursor:pointer;transition:all .2s;font-family:'IBM Plex Mono',monospace}
.data-btn:hover{background:var(--accent);color:#fff}
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:180px;background:linear-gradient(180deg,#ede4d3,#e3d7c4);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;flex-shrink:0}
.sidebar-section{padding:12px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);border-bottom:1px solid var(--border);margin-bottom:4px}
.sidebar-item{padding:10px 16px;font-size:13px;cursor:pointer;color:var(--text-dim);transition:all .15s;border-left:3px solid transparent;display:flex;align-items:center;justify-content:space-between}
.sidebar-item:hover{background:var(--bg-hover);color:var(--text);border-left-color:rgba(91,141,239,.4)}
.sidebar-item.active{border-left-color:var(--accent);color:var(--accent-dark);background:linear-gradient(90deg,rgba(201,147,58,.15),transparent)}
.sidebar-add{color:var(--accent);border-left-color:var(--accent);margin-top:8px}
.sidebar-count{font-size:10px;background:linear-gradient(120deg,var(--accent),var(--teal));color:#fff;padding:1px 7px;border-radius:10px;font-weight:700}
.content{flex:1;overflow-y:auto;padding:28px 36px}
.card{background:linear-gradient(160deg,#fdfaf5,#f5efe3);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:border-color .2s}
.card:hover{border-color:rgba(201,147,58,.4)}
.date-group-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:linear-gradient(90deg,rgba(201,147,58,.12),transparent);border-radius:10px;cursor:pointer;user-select:none}
.date-group-header:hover{background:linear-gradient(90deg,rgba(201,147,58,.2),transparent)}
.date-group-label{font-size:13px;font-weight:700;color:var(--accent-dark);letter-spacing:.3px}
.date-group-toggle{font-size:12px;color:var(--text-dim);transition:transform .2s;display:inline-block}
.date-group-body{max-height:2000px;transition:max-height .3s ease,opacity .3s ease;overflow:hidden;opacity:1}
.date-group-body.collapsed{max-height:0!important;opacity:0}
.edit-note-area{width:100%;min-height:80px;padding:8px 10px;background:#fffdf7;border:1.5px solid var(--accent);border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;line-height:1.6;resize:vertical}
.edit-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font-size:11px;padding:3px 9px;border-radius:6px;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .15s}
.edit-btn:hover{border-color:var(--accent);color:var(--accent)}
.save-edit-btn{background:linear-gradient(120deg,var(--accent),var(--accent-dark));color:#fff;border:none;font-size:11px;padding:4px 12px;border-radius:6px;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .15s;margin-right:6px}
.cancel-edit-btn{background:var(--bg-hover);color:var(--text-dim);border:1px solid var(--border);font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:'IBM Plex Mono',monospace}
.card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px;padding-left:11px;position:relative;cursor:pointer;user-select:none}
.card-title::before{content:"";position:absolute;left:0;top:2px;bottom:2px;width:3px;border-radius:3px;background:linear-gradient(180deg,var(--accent),var(--teal));}
.card-title-toggle{font-size:12px;color:var(--text-dim);transition:transform .2s;display:inline-block;margin-left:auto}
.card-content{max-height:2000px;transition:max-height .3s ease,opacity .3s ease;overflow:hidden;opacity:1}
.card-content.collapsed{max-height:0!important;opacity:0}
.split-section{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:1000px){.split-section{grid-template-columns:1fr}}
input[type=text],input[type=date],input[type=time],textarea,select{width:100%;padding:10px 12px;background:#fdfaf5;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
.btn-primary{padding:10px 16px;background:linear-gradient(120deg,var(--accent),var(--accent-dark));color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;transition:all .2s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,147,58,.35)}
.btn-secondary{padding:9px 14px;background:var(--bg-hover);color:var(--text);border:1px solid var(--border);border-radius:10px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px;transition:all .15s}
.btn-secondary:hover{background:var(--border);border-color:rgba(201,147,58,.3)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#a85656}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fdfaf5;border:1px solid var(--border);border-radius:14px;padding:24px;width:600px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.4);max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--accent-light)}
.modal-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);display:block;margin-bottom:6px;margin-top:12px}
.modal-label:first-of-type{margin-top:0}
.modal-buttons{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.empty-state{text-align:center;padding:20px;color:var(--text-dim);font-size:13px}
.del-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:4px 8px;border-radius:4px;transition:all .15s;flex-shrink:0}
.del-btn:hover{color:var(--red);background:rgba(201,112,112,.1)}
/* CALENDAR */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-month-label{font-size:18px;font-weight:700;color:var(--accent-light)}
.cal-nav-btns{display:flex;gap:8px}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
.cal-weekday{text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);padding:4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-cell{min-height:80px;background:#fdfaf5;border:1px solid var(--border);border-radius:8px;padding:6px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:3px;overflow:hidden}
.cal-cell:hover{border-color:var(--accent)}
.cal-cell.empty{background:transparent;border:none;cursor:default}
.cal-cell.today{border-color:var(--accent);background:linear-gradient(160deg,rgba(201,147,58,.18),transparent)}
.cal-cell.has-activity{background:linear-gradient(160deg,rgba(90,138,106,.15),transparent)}
.cal-cell.selected{border-color:var(--accent);border-width:2px}
.cal-day-num{font-size:12px;font-weight:700;color:var(--text)}
.cal-names{font-size:9px;color:var(--teal);line-height:1.3;word-break:break-word}
.cal-yaakov-tag{font-size:8px;color:var(--amber);font-weight:700}
.day-detail{margin-top:20px}
.day-card{background:#fdfaf5;border:1px solid var(--border);border-radius:12px;padding:20px}
.day-date{font-size:17px;font-weight:700;color:var(--accent-light);margin-bottom:14px}
.day-section{margin-bottom:16px}
.day-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);margin-bottom:8px}
.item-row{background:rgba(245,239,227,.8);padding:13px;border-radius:10px;margin-bottom:8px;font-size:12px;line-height:1.5;border-left:3px solid var(--accent);display:flex;justify-content:space-between;gap:8px}
.item-row:hover{background:rgba(237,228,211,.9)}
.item-row.blue{border-left-color:var(--blue)}
.item-row.green{border-left-color:var(--green)}
.item-body{flex:1;min-width:0}
.item-meta{font-size:10px;color:var(--text-dim);margin-bottom:4px}
.note-date{font-size:10px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;margin-bottom:4px}
.quick-btn{position:fixed;bottom:24px;right:24px;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--teal));color:#fff;border:none;font-size:28px;cursor:pointer;transition:all .2s;box-shadow:0 4px 15px rgba(201,147,58,.3)}
.quick-btn:hover{transform:scale(1.12) rotate(90deg);box-shadow:0 8px 30px rgba(90,138,106,.5)}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg-dark)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.badge{display:inline-block;font-size:10px;background:var(--border);color:var(--text-dim);padding:2px 7px;border-radius:10px;font-weight:600;margin-left:6px}
.badge.amber{background:linear-gradient(120deg,var(--accent),var(--accent-dark));color:#fff}
.badge.red{background:var(--red);color:#fff}
h1.page-title{font-size:27px;font-weight:700;margin-bottom:24px;color:var(--forest);letter-spacing:-.5px}
/* SCHEDULE */
.sched-date-nav{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.sched-date-label{font-size:20px;font-weight:700;color:var(--accent-light);min-width:160px}
.sched-entry{background:#fdfaf5;border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;transition:border-color .2s}
.sched-entry:hover{border-color:rgba(201,147,58,.5)}
.sched-entry.type-meeting{border-left:4px solid var(--blue)}
.sched-entry.type-task{border-left:4px solid var(--teal)}
.sched-entry.done-entry{opacity:.6}
.sched-time{font-size:13px;font-weight:700;color:var(--accent);font-family:'IBM Plex Mono',monospace;min-width:52px;padding-top:2px}
.sched-body{flex:1;min-width:0}
.sched-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.sched-title.done-text{text-decoration:line-through;color:var(--text-dim)}
.sched-who{font-size:12px;color:var(--blue);margin-bottom:3px}
.sched-note{font-size:12px;color:var(--text-dim);line-height:1.5;margin-top:4px;white-space:pre-wrap}
.sched-type-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600;margin-right:6px}
.sched-type-badge.meeting{background:rgba(45,106,138,.15);color:var(--blue)}
.sched-type-badge.task{background:rgba(90,138,106,.15);color:var(--teal)}
.sched-actions{display:flex;gap:4px;flex-shrink:0;padding-top:2px}
.sched-cb{width:20px;height:20px;border:2px solid var(--border);border-radius:5px;background:#fdfaf5;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px}
.sched-cb:hover{border-color:var(--teal)}
.sched-cb.checked{background:linear-gradient(135deg,var(--green),var(--teal));border-color:var(--green)}
.sched-cb.checked::after{content:'\u2713';color:#fff;font-size:11px;font-weight:700}
.sched-empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:14px}
.sched-section-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);padding:8px 0 6px;border-bottom:1px solid var(--border);margin-bottom:10px}
/* CALL REVIEW */
.cr-lead{background:#fdfaf5;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;transition:border-color .2s}
.cr-lead:hover{border-color:rgba(201,147,58,.4)}
.cr-lead.reviewed{opacity:.55;border-color:rgba(90,138,106,.35);background:rgba(90,138,106,.05)}
.cr-cb{width:20px;height:20px;border:2px solid var(--border);border-radius:5px;background:#fdfaf5;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px}
.cr-cb:hover{border-color:var(--teal)}
.cr-cb.checked{background:linear-gradient(135deg,var(--green),var(--teal));border-color:var(--green)}
.cr-cb.checked::after{content:'\u2713';color:#fff;font-size:11px;font-weight:700}
.cr-lead-body{flex:1;min-width:0}
.cr-lead-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.cr-lead-name.reviewed-text{text-decoration:line-through;color:var(--text-dim)}
.cr-lead-meta{font-size:11px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;margin-bottom:4px}
.cr-lead-note{font-size:12px;color:var(--text);line-height:1.55;background:rgba(201,147,58,.07);border-left:3px solid var(--accent);padding:6px 10px;border-radius:0 6px 6px 0;white-space:pre-wrap;margin-top:4px}
.cr-actions{display:flex;gap:4px;flex-shrink:0;padding-top:2px}
.cr-section-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.cr-clear-btn{font-size:11px;padding:4px 10px;background:rgba(194,59,42,.1);color:var(--red);border:1px solid rgba(194,59,42,.25);border-radius:6px;cursor:pointer;font-family:'IBM Plex Mono',monospace}
.cr-clear-btn:hover{background:var(--red);color:#fff}
.cr-empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:13px}
.cr-accordion{margin-bottom:12px;border:1px solid var(--border);border-radius:14px;overflow:hidden;background:#fdfaf5}
.cr-accordion-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;background:linear-gradient(90deg,rgba(201,147,58,.09),transparent);user-select:none;transition:background .15s}
.cr-accordion-header:hover{background:linear-gradient(90deg,rgba(201,147,58,.18),transparent)}
.cr-accordion-title{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:10px}
.cr-accordion-toggle{font-size:13px;color:var(--text-dim);transition:transform .22s;display:inline-block}
.cr-accordion-body{padding:0 16px 4px;max-height:3000px;transition:max-height .3s ease,opacity .3s ease,padding .3s ease;overflow:hidden;opacity:1}
.cr-accordion-body.cr-collapsed{max-height:0!important;opacity:0;padding-top:0;padding-bottom:0}
.cr-accordion-actions{display:flex;gap:6px;align-items:center}
</style>
</head>
<body>
<div class="app">
<div class="header">
<div class="logo">coaching hub</div>
<div style="display:flex;align-items:center;gap:16px">
<div class="nav-dots" id="nav-buttons"></div>
<div class="save-ind" id="save-indicator">saved</div>
<div class="data-controls">
<button class="data-btn" onclick="exportData()" title="Download your data">&#8595; export</button>
<button class="data-btn" onclick="openImportModal()" title="Load data from file">&#8593; import</button>
</div>
</div>
</div>
<div class="main">
<div class="sidebar" id="sidebar"></div>
<div class="content" id="content"></div>
</div>
</div>

<!-- LOG MEETING MODAL -->
<div class="modal-overlay" id="meeting-modal">
<div class="modal-box">
<div class="modal-title">&#127897;&#65039; Log Meeting</div>
<label class="modal-label">Trainee(s)</label>
<input type="text" id="m-meet-trainees" placeholder="Cameron, Joshua, Astra">
<label class="modal-label">Date</label>
<input type="date" id="m-meet-date">
<label class="modal-label">Notes (optional)</label>
<textarea id="m-meet-notes" placeholder="e.g. Sales Training, role play, pipeline review..."></textarea>
<div class="modal-buttons">
<button class="btn-secondary" onclick="closeMeetingModal()">cancel</button>
<button class="btn-primary" onclick="saveMeeting()">save meeting</button>
</div>
</div>
</div>

<!-- YAAKOV MODAL -->
<div class="modal-overlay" id="yaakov-modal">
<div class="modal-box">
<div class="modal-title">&#127919; Yaakov Meeting</div>
<p style="font-size:12px;color:var(--text-dim);margin-bottom:14px">Log direction from Yaakov anytime during the day</p>
<label class="modal-label">Date</label>
<input type="date" id="m-yak-date">
<label class="modal-label">Time (optional)</label>
<input type="time" id="m-yak-time">
<label class="modal-label">What Yaakov said / direction</label>
<textarea id="m-yak-notes" placeholder="Who to focus on? What does he want done? Any issues?"></textarea>
<label class="modal-label">Trainees mentioned (optional)</label>
<input type="text" id="m-yak-trainees" placeholder="Cameron, Joshua, Astra">
<div class="modal-buttons">
<button class="btn-secondary" onclick="closeYaakovModal()">cancel</button>
<button class="btn-primary" onclick="saveYaakovMeeting()">log it</button>
</div>
</div>
</div>

<!-- COACHING NOTE MODAL -->
<div class="modal-overlay" id="coachnote-modal">
<div class="modal-box">
<div class="modal-title">&#128203; Add Coaching Note</div>
<label class="modal-label">Date</label>
<input type="date" id="m-cn-date">
<label class="modal-label">Notes</label>
<textarea id="m-cn-text" style="min-height:120px" placeholder="Coaching points, lead feedback, observations, action items..."></textarea>
<input type="hidden" id="m-cn-trainee-id">
<div class="modal-buttons">
<button class="btn-secondary" onclick="closeCoachNoteModal()">cancel</button>
<button class="btn-primary" onclick="saveCoachNote()">save note</button>
</div>
</div>
</div>

<!-- IMPORT MODAL -->
<div class="modal-overlay" id="import-modal">
<div class="modal-box">
<div class="modal-title">&#128229; Import Data</div>
<p style="font-size:12px;color:var(--text-dim);margin-bottom:16px">Select your saved data file (.json)</p>
<input type="file" id="import-file" accept=".json" style="width:100%;margin-bottom:16px;padding:8px;background:var(--bg-dark);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer">
<div class="modal-buttons">
<button class="btn-secondary" onclick="closeImportModal()">cancel</button>
<button class="btn-primary" onclick="importData()">import</button>
</div>
</div>
</div>

<!-- CALL REVIEW MODAL -->
<div class="modal-overlay" id="cr-modal">
<div class="modal-box">
<div class="modal-title" id="cr-modal-title">&#128222; Add Lead to Review</div>
<label class="modal-label">Trainee</label>
<select id="m-cr-trainee"><option value="">&#8212; select trainee &#8212;</option></select>
<label class="modal-label">Lead Name</label>
<input type="text" id="m-cr-name" placeholder="e.g. Sylvia Snowden, James Land...">
<label class="modal-label">Call Date &amp; Time (optional)</label>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
<input type="date" id="m-cr-date">
<input type="time" id="m-cr-time">
</div>
<label class="modal-label">Coaching Notes</label>
<textarea id="m-cr-note" style="min-height:110px" placeholder="e.g. no fu quoted June 10th, no text since the 9th, calls too short..."></textarea>
<input type="hidden" id="m-cr-edit-id" value="">
<div class="modal-buttons">

<div class="modal-box">
<div class="modal-title" id="sched-modal-title">&#128197; Add Schedule Entry</div>
<label class="modal-label">Type</label>
<select id="m-sched-type">
<option value="meeting">&#129309; Meeting</option>

<button class="quick-btn" onclick="openSchedModal('','');" title="Add to schedule">+</button>
<script>
let STATE = { trainees:[], meetings:[], yaakovMeetings:[], coachingNotes:[], scheduleEntries:[], callReviews:[], noteId:1, traineeId:1 };
const NOW = new Date();
const TODAY = NOW.toISOString().slice(0,10);
const TODAY_DISPLAY = NOW.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const WEEKDAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
let calMonth = NOW.getMonth(), calYear = NOW.getFullYear(), selectedCalKey = null;
let collapsedSections = {};
let schedViewDate = TODAY;

function load(){
try{ const s=localStorage.getItem('coaching_v8'); if(s){ STATE=JSON.parse(s); } else {
  // migrate from v7
  const old=localStorage.getItem('coaching_v7');
  if(old){
    const o=JSON.parse(old);
    STATE.trainees=o.trainees||[];
    STATE.meetings=o.meetings||[];
    STATE.yaakovMeetings=o.yaakovMeetings||[];
    STATE.scheduleEntries=o.scheduleEntries||[];
    STATE.callReviews=o.callReviews||[];
    STATE.noteId=o.noteId||1;
    STATE.traineeId=o.traineeId||1;
    // merge all old note types into coachingNotes
    STATE.coachingNotes=[];
    (o.notes||[]).forEach(function(n){
      STATE.coachingNotes.push({id:STATE.noteId++,traineeId:n.traineeId||null,dateKey:n.dateKey||TODAY,date:n.date||TODAY_DISPLAY,text:n.text||''});
    });
    (o.dayNotes||[]).forEach(function(n){
      STATE.coachingNotes.push({id:STATE.noteId++,traineeId:n.traineeId||null,dateKey:n.dateKey||TODAY,date:n.date||TODAY_DISPLAY,text:n.text||''});
    });
    (o.leadLogs||[]).forEach(function(n){
      STATE.coachingNotes.push({id:STATE.noteId++,traineeId:n.traineeId||null,dateKey:n.dateKey||TODAY,date:n.date||TODAY_DISPLAY,text:n.text||''});
    });
    STATE.coachingNotes.sort(function(a,b){return b.dateKey.localeCompare(a.dateKey);});
  }
}}catch(e){}
try{ const c=localStorage.getItem('coaching_collapsed'); if(c)collapsedSections=JSON.parse(c); }catch(e){}
STATE.trainees=STATE.trainees||[];STATE.meetings=STATE.meetings||[];STATE.yaakovMeetings=STATE.yaakovMeetings||[];STATE.coachingNotes=STATE.coachingNotes||[];STATE.scheduleEntries=STATE.scheduleEntries||[];STATE.callReviews=STATE.callReviews||[];
if(!STATE.noteId)STATE.noteId=1; if(!STATE.traineeId)STATE.traineeId=1;
document.getElementById('save-indicator').textContent='loaded';
}

function save(){ try{localStorage.setItem('coaching_v8',JSON.stringify(STATE));localStorage.setItem('coaching_collapsed',JSON.stringify(collapsedSections));document.getElementById('save-indicator').textContent='saved';}catch(e){document.getElementById('save-indicator').textContent='error';}}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function dateOf(item){ if(item.dateKey){const[y,m,d]=item.dateKey.split('-').map(Number);return new Date(y,m-1,d);} const p=new Date(item.date); return isNaN(p)?null:p; }
function keyFromDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function traineeName(id){ const t=STATE.trainees.find(x=>x.id===id); return t?t.name:''; }
function fmtDate(key){ if(!key)return''; const[y,m,d]=key.split('-').map(Number); return MONTHS_FULL[m-1].slice(0,3)+' '+d; }
function fmtDateFull(key){ if(!key)return''; const[y,m,d]=key.split('-').map(Number); return MONTHS_FULL[m-1]+' '+d+', '+y; }
function fmtTime(t){ if(!t)return''; const[h,m]=t.split(':').map(Number); const ampm=h>=12?'pm':'am'; return ((h%12)||12)+':'+(m<10?'0':'')+m+' '+ampm; }

function toggleSection(id){
collapsedSections[id]=!collapsedSections[id];
save();
updateSectionUI(id);
}
function updateSectionUI(id){
const content=document.getElementById('content-'+id);
const toggle=document.getElementById('toggle-'+id);
if(content){
if(collapsedSections[id]){content.classList.add('collapsed');if(toggle)toggle.textContent='\u25B6';}
else{content.classList.remove('collapsed');if(toggle)toggle.textContent='\u25BC';}
}
}

let currentPage='home';
function showPage(name){ currentPage=name; document.getElementById('content').innerHTML=renderPage(name); updateNav(); buildSidebar(); }
function updateNav(){
const nav=document.getElementById('nav-buttons');
const todaySched=STATE.scheduleEntries.filter(e=>e.dateKey===TODAY).length;
const pendingCr=STATE.callReviews.filter(function(r){return !r.reviewed;}).length;
const items=[{id:'home',label:'Home'},{id:'schedule',label:'Schedule'+(todaySched?' ('+todaySched+')':'')},{id:'callreview',label:'Call Review'+(pendingCr?' ('+pendingCr+')':'')},{id:'calendar',label:'Calendar'},{id:'yaakov',label:'Yaakov'}];
nav.innerHTML = items.map(i => 
    `<button class="nav-btn ${currentPage === i.id ? 'active' : ''}" onclick="showPage('${i.id}')">${i.label}</button>`
).join('');}
function renderPage(name){
if(name==='home')return renderHome();
if(name==='schedule')return renderSchedule();
if(name==='calendar')return renderCalendar();
if(name==='callreview')return renderCallReview();
if(name==='yaakov')return renderYaakov();
if(name.startsWith('trainee-')){const id=parseInt(name.split('-')[1]);const tr=STATE.trainees.find(t=>t.id===id);return tr?renderTrainee(tr):'<div class="empty-state">Not found</div>';}
return '';
}

// HOME
function renderHome(){
const todayYak=STATE.yaakovMeetings.filter(y=>{const d=dateOf(y);return d&&keyFromDate(d)===TODAY;});
const todaySched=STATE.scheduleEntries.filter(e=>e.dateKey===TODAY).sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));

const html='<h1 class="page-title">\u{1F4CA} Today's Workflow</h1>'+
'<div style="font-size:13px;color:var(--text-dim);margin-top:-16px;margin-bottom:24px">'+TODAY_DISPLAY+'</div>'+
'<div class="card">'+
'<div class="card-title" onclick="toggleSection('home-schedule')">\u{1F4C5} Today's Schedule'+(todaySched.length?'<span class="badge amber">'+todaySched.length+'</span>':'')+'<span class="card-title-toggle" id="toggle-home-schedule">\u25BC</span></div>'+
'<div class="card-content" id="content-home-schedule">'+
(todaySched.length?todaySched.map(e=>schedEntryRow(e,true)).join(''):'<div class="sched-empty">Nothing scheduled for today</div>')+
'<div style="display:flex;gap:8px;margin-top:12px">'+
'<button class="btn-primary" style="flex:1" onclick="openSchedModal('',TODAY)">+ add to today</button>'+
'<button class="btn-secondary" style="flex:1" onclick="showPage('schedule')">view full schedule</button>'+
'</div>'+
'</div>'+
'</div>'+
'<div class="split-section">'+
'<div class="card" style="padding:16px">'+
'<div class="card-title" onclick="toggleSection('home-yaakov')">\u{1F3AF} Yaakov'+(todayYak.length?'<span class="badge amber">'+todayYak.length+'</span>':'')+'<span class="card-title-toggle" id="toggle-home-yaakov">\u25BC</span></div>'+
'<div class="card-content" id="content-home-yaakov">'+
(todayYak.length?'<div style="font-size:13px;color:var(--text-dim);margin-bottom:8px">'+todayYak.length+' meeting'+(todayYak.length!==1?'s':'')+' today</div>':'<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">No Yaakov meetings today</div>')+
'<div style="display:flex;gap:8px">'+
'<button class="btn-secondary btn-sm" style="flex:1" onclick="showPage('yaakov')">view Yaakov</button>'+
'<button class="btn-secondary btn-sm" onclick="openYaakovModal()">+ log</button>'+
'</div>'+
'</div>'+
'</div>'+
'<div class="card">'+
'<div class="card-title" onclick="toggleSection('home-addmeet')">\u{1F91D} Log Meeting<span class="card-title-toggle" id="toggle-home-addmeet">\u25BC</span></div>'+
'<div class="card-content" id="content-home-addmeet">'+
(STATE.trainees.length?'<div style="font-size:12px;color:var(--text-dim);margin-bottom:10px">Log a meeting with a trainee</div>'+STATE.trainees.map(function(t){return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;margin-bottom:6px;background:var(--bg-dark)"><span style="font-size:13px;font-weight:600;color:var(--text)">'+esc(t.name)+'</span><button class="btn-primary btn-sm" onclick="openMeetingFor('+t.id+')">+ log meeting</button></div>';}).join(''):'<div class="empty-state">No trainees yet</div>')+
'</div>'+
'</div>';

setTimeout(function(){
['home-schedule','home-yaakov','home-addmeet'].forEach(function(id){updateSectionUI(id);});
},0);
return html;
}

// SCHEDULE
function renderSchedule(){
const entries=STATE.scheduleEntries.filter(e=>e.dateKey===schedViewDate).sort(function(a,b){return (a.time||'99:99').localeCompare(b.time||'99:99');});
const meetings=entries.filter(e=>e.type==='meeting');
const tasks=entries.filter(e=>e.type==='task');
const dateObj=new Date(schedViewDate+'T12:00:00');
const dispDate=MONTHS_FULL[dateObj.getMonth()]+' '+dateObj.getDate()+', '+dateObj.getFullYear();
const isToday=schedViewDate===TODAY;

function changeSchedDate(delta){const d=new Date(schedViewDate+'T12:00:00');d.setDate(d.getDate()+delta);schedViewDate=keyFromDate(d);showPage('schedule');}
window._changeSchedDate=changeSchedDate;

const entriesHtml=entries.length?(
(meetings.length?'<div class="sched-section-header">\u{1F91D} Meetings ('+meetings.length+')</div>'+meetings.map(function(e){return schedEntryRow(e,false);}).join(''):'')+
(tasks.length?'<div class="sched-section-header" style="margin-top:'+(meetings.length?'16':'0')+'px">\u2705 Tasks &amp; To-dos ('+tasks.length+')</div>'+tasks.map(function(e){return schedEntryRow(e,false);}).join(''):''))
:'<div class="sched-empty" style="padding:60px 20px"><div style="font-size:32px;margin-bottom:12px">\u{1F4C5}</div><div>Nothing scheduled for this day.</div><div style="margin-top:8px;font-size:13px">Add a meeting or task below.</div></div>';

return '<h1 class="page-title">\u{1F4C5} Daily Schedule</h1>'+
'<div class="sched-date-nav">'+
'<button class="btn-secondary btn-sm" onclick="window._changeSchedDate(-1)">\u2039 prev</button>'+
'<div class="sched-date-label">'+dispDate+(isToday?' <span class="badge amber">Today</span>':'')+'</div>'+
'<button class="btn-secondary btn-sm" onclick="window._changeSchedDate(1)">next \u203A</button>'+
'<button class="btn-secondary btn-sm" onclick="schedViewDate=TODAY;showPage('schedule')">Today</button>'+
'<input type="date" value="'+schedViewDate+'" onchange="schedViewDate=this.value;showPage('schedule')" style="width:auto;padding:6px 10px;font-size:12px">'+
'</div>'+
'<div class="card">'+entriesHtml+'</div>'+
'<div style="display:flex;gap:10px;margin-top:4px">'+
'<button class="btn-primary" onclick="openSchedModal('meeting',schedViewDate)">+ add meeting</button>'+
'<button class="btn-secondary" onclick="openSchedModal('task',schedViewDate)">+ add task</button>'+
'</div>';
}

function schedEntryRow(e,compact){
const timeStr=e.time?fmtTime(e.time):'';
const isDone=!!e.done;
return '<div class="sched-entry type-'+e.type+(isDone?' done-entry':'')+'">'+
'<div class="sched-cb'+(isDone?' checked':'')+'" onclick="toggleSchedDone('+e.id+')" title="'+(isDone?'Mark undone':'Mark done')+'"></div>'+
'<div style="flex:1;min-width:0">'+
(timeStr?'<div class="sched-time">'+esc(timeStr)+'</div>':'')+
'<div class="sched-title'+(isDone?' done-text':'')+'"><span class="sched-type-badge '+e.type+'">'+(e.type==='meeting'?'meeting':'task')+'</span>'+esc(e.title)+'</div>'+
(e.who&&e.type==='meeting'?'<div class="sched-who">\u{1F464} with: '+esc(e.who)+'</div>':'')+
(e.notes&&!compact?'<div class="sched-note">'+esc(e.notes)+'</div>':'')+
(e.notes&&compact?'<div class="sched-note" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:400px">'+esc(e.notes)+'</div>':'')+
'</div>'+
'<div class="sched-actions">'+
'<button class="edit-btn" onclick="openSchedEditModal('+e.id+')" title="Edit">\u270F</button>'+
'<button class="del-btn" onclick="deleteSchedEntry('+e.id+')" title="Delete">\u2715</button>'+
'</div>'+
'</div>';
}

function openSchedModal(type,dateKey){
document.getElementById('sched-modal-title').textContent=(type==='meeting'?'\u{1F91D} Add Meeting':type==='task'?'\u2705 Add Task':'\u{1F4C5} Add Schedule Entry');
document.getElementById('m-sched-type').value=type||'meeting';
document.getElementById('m-sched-date').value=dateKey||schedViewDate||TODAY;
document.getElementById('m-sched-time').value='';
document.getElementById('m-sched-title').value='';
document.getElementById('m-sched-who').value='';
document.getElementById('m-sched-notes').value='';
document.getElementById('m-sched-edit-id').value='';
updateSchedWhoLabel();
document.getElementById('sched-modal').classList.add('open');
document.getElementById('m-sched-title').focus();
}
function openSchedEditModal(id){
const e=STATE.scheduleEntries.find(x=>x.id===id);
if(!e)return;
document.getElementById('sched-modal-title').textContent='\u270F Edit Entry';
document.getElementById('m-sched-type').value=e.type||'meeting';
document.getElementById('m-sched-date').value=e.dateKey||TODAY;
document.getElementById('m-sched-time').value=e.time||'';
document.getElementById('m-sched-title').value=e.title||'';
document.getElementById('m-sched-who').value=e.who||'';
document.getElementById('m-sched-notes').value=e.notes||'';
document.getElementById('m-sched-edit-id').value=id;
updateSchedWhoLabel();
document.getElementById('sched-modal').classList.add('open');
document.getElementById('m-sched-title').focus();
}
function updateSchedWhoLabel(){
const type=document.getElementById('m-sched-type').value;
const whoLabel=document.getElementById('m-sched-who-label');
const whoInput=document.getElementById('m-sched-who');
if(type==='meeting'){whoLabel.style.display='block';whoInput.style.display='block';whoLabel.textContent='Who are you meeting with?';whoInput.placeholder='e.g. Cameron, Joshua, client name...';}
else{whoLabel.style.display='none';whoInput.style.display='none';}
}
document.addEventListener('DOMContentLoaded',function(){var typeEl=document.getElementById('m-sched-type');if(typeEl)typeEl.addEventListener('change',updateSchedWhoLabel);});
function closeSchedModal(){document.getElementById('sched-modal').classList.remove('open');}
function saveSchedEntry(){
const title=document.getElementById('m-sched-title').value.trim();
if(!title){alert('Please enter a title');return;}
const type=document.getElementById('m-sched-type').value;
const dateKey=document.getElementById('m-sched-date').value||TODAY;
const time=document.getElementById('m-sched-time').value;
const who=document.getElementById('m-sched-who').value.trim();
const notes=document.getElementById('m-sched-notes').value.trim();
const editId=document.getElementById('m-sched-edit-id').value;
if(editId){const e=STATE.scheduleEntries.find(x=>x.id===parseInt(editId));if(e){e.type=type;e.dateKey=dateKey;e.time=time;e.title=title;e.who=who;e.notes=notes;}}
else{STATE.scheduleEntries.push({id:STATE.noteId++,type,dateKey,time,title,who,notes,done:false});}
schedViewDate=dateKey;
save();closeSchedModal();showPage(currentPage==='schedule'||currentPage==='home'?currentPage:'schedule');
}
function toggleSchedDone(id){const e=STATE.scheduleEntries.find(x=>x.id===id);if(e)e.done=!e.done;save();showPage(currentPage);}
function deleteSchedEntry(id){if(!confirm('Delete this entry?'))return;STATE.scheduleEntries=STATE.scheduleEntries.filter(e=>e.id!==id);save();showPage(currentPage);}

// CALENDAR
function renderCalendar(){
const firstDay=new Date(calYear,calMonth,1).getDay();
const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
let cells='';
for(let i=0;i<firstDay;i++)cells+='<div class="cal-cell empty"></div>';
for(let day=1;day<=daysInMonth;day++){
const key=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
const dMeet=STATE.meetings.filter(function(m){const d=dateOf(m);return d&&keyFromDate(d)===key;});
const dYak=STATE.yaakovMeetings.filter(function(y){const d=dateOf(y);return d&&keyFromDate(d)===key;});
const dSched=STATE.scheduleEntries.filter(function(e){return e.dateKey===key;});
const isToday=(calYear===NOW.getFullYear()&&calMonth===NOW.getMonth()&&day===NOW.getDate());
const has=dMeet.length||dYak.length||dSched.length;
const names=dMeet.map(function(m){return m.trainees;}).join(', ');
const schedCount=dSched.length;
cells+='<div class="cal-cell '+(isToday?'today':'')+' '+(has?'has-activity':'')+' '+(selectedCalKey===key?'selected':'')+'" onclick="selectCalDay(''+key+'')">'+'<div class="cal-day-num">'+day+'</div>'+(dYak.length?'<div class="cal-yaakov-tag">YAK</div>':'')+(names?'<div class="cal-names">'+esc(names)+'</div>':'')+(schedCount?'<div class="cal-names" style="color:var(--accent)">\u{1F4C5} '+schedCount+'</div>':'')+'</div>';
}
let detail='';
if(selectedCalKey){
const dMeet=STATE.meetings.filter(function(m){const d=dateOf(m);return d&&keyFromDate(d)===selectedCalKey;});
const dYak=STATE.yaakovMeetings.filter(function(y){const d=dateOf(y);return d&&keyFromDate(d)===selectedCalKey;});
const dSched=STATE.scheduleEntries.filter(function(e){return e.dateKey===selectedCalKey;}).sort(function(a,b){return(a.time||'99:99').localeCompare(b.time||'99:99');});
const parts=selectedCalKey.split('-').map(Number);
const yy=parts[0],mm=parts[1],dd=parts[2];
detail='<div class="day-detail"><div class="day-card"><div class="day-date">'+MONTHS_FULL[mm-1]+' '+dd+', '+yy+'</div>'+
(dSched.length?'<div class="day-section"><div class="day-section-title">\u{1F4C5} Scheduled ('+dSched.length+')</div>'+dSched.map(function(e){return schedEntryRow(e,true);}).join('')+'<button class="btn-secondary btn-sm" style="margin-top:8px" onclick="schedViewDate=''+selectedCalKey+'';showPage('schedule')">view / edit day</button></div>':'')+
(dYak.length?'<div class="day-section"><div class="day-section-title">\u{1F3AF} Yaakov ('+dYak.length+')</div>'+dYak.map(function(y){return '<div class="item-row"><div class="item-body">'+(y.time?'<div class="item-meta">'+y.time+'</div>':'')+(y.notes?'<div>'+esc(y.notes)+'</div>':'')+'</div></div>';}).join('')+'</div>':'')+
(dMeet.length?'<div class="day-section"><div class="day-section-title">\u{1F399}\uFE0F Trainee Meetings ('+dMeet.length+')</div>'+dMeet.map(function(m){var tLinks=(m.traineesArray&&m.traineesArray.length)?m.traineesArray.map(function(tid){var tr=STATE.trainees.find(function(t){return t.id===tid;});return tr?'<button class="btn-secondary btn-sm" onclick="showPage('trainee-'+tr.id+'')" style="margin:2px 4px 2px 0;font-size:12px">'+esc(tr.name)+'</button>':'<span>'+esc(m.trainees)+'</span>';}).join(''):'<span>'+esc(m.trainees)+'</span>';return '<div class="item-row blue"><div class="item-body"><div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">Click name to see notes</div><div>'+tLinks+'</div></div></div>';}).join('')+'</div>':'')+
(!dYak.length&&!dMeet.length&&!dSched.length?'<div class="empty-state">Nothing logged this day</div>':'')+
'</div></div>';
}
return '<h1 class="page-title">\u{1F4C5} Calendar</h1>'+
'<div class="card">'+
'<div class="cal-head"><div class="cal-month-label">'+MONTHS_FULL[calMonth]+' '+calYear+'</div>'+
'<div class="cal-nav-btns"><button class="btn-secondary btn-sm" onclick="calPrev()">\u2039 prev</button><button class="btn-secondary btn-sm" onclick="calToday()">today</button><button class="btn-secondary btn-sm" onclick="calNext()">next \u203A</button></div>'+
'</div>'+
'<div class="cal-weekdays">'+WEEKDAYS.map(function(w){return '<div class="cal-weekday">'+w+'</div>';}).join('')+'</div>'+
'<div class="cal-grid">'+cells+'</div>'+
'</div>'+detail;
}
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}selectedCalKey=null;showPage('calendar');}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}selectedCalKey=null;showPage('calendar');}
function calToday(){calMonth=NOW.getMonth();calYear=NOW.getFullYear();selectedCalKey=TODAY;showPage('calendar');}
function selectCalDay(key){selectedCalKey=(selectedCalKey===key)?null:key;showPage('calendar');}

// YAAKOV
function renderYaakov(){
const meetings=[...STATE.yaakovMeetings].sort(function(a,b){const da=dateOf(a),db=dateOf(b);return(db?db.getTime():0)-(da?da.getTime():0);});
const groups={};
meetings.forEach(function(y){const key=y.dateKey||y.date||'Unknown';if(!groups[key])groups[key]=[];groups[key].push(y);});
const groupKeys=Object.keys(groups).sort(function(a,b){return b.localeCompare(a);});
const groupsHtml=groupKeys.map(function(key){
const items=groups[key];
const label=items[0].date||key;
const collapsed=collapsedSections['yak-'+key]?'collapsed':'';
const arrow=collapsedSections['yak-'+key]?'\u25B6':'\u25BC';
const cardsHtml=items.map(function(y){
const noteLines=y.notes?y.notes.split('\n').filter(Boolean):[];
return '<div class="card" style="border-left:3px solid var(--accent);padding:18px 20px;margin-bottom:12px">'+

function importData(){

const reader=new FileReader();
reader.onload=function(e){try{
  const imported=JSON.parse(e.target.result);
  STATE=imported;
  // ensure new fields exist
  STATE.coachingNotes=STATE.coachingNotes||[];
  STATE.scheduleEntries=STATE.scheduleEntries||[];
  STATE.callReviews=STATE.callReviews||[];
  STATE.trainees=STATE.trainees||[];
  STATE.meetings=STATE.meetings||[];
  STATE.yaakovMeetings=STATE.yaakovMeetings||[];
  if(!STATE.noteId)STATE.noteId=1;if(!STATE.traineeId)STATE.traineeId=1;
  // migrate if needed
  if((imported.notes||imported.dayNotes||imported.leadLogs)&&!imported.coachingNotes){
    STATE.coachingNotes=[];
    (imported.notes||[]).forEach(function(n){STATE.coachingNotes.push({id:STATE.noteId++,traineeId:n.traineeId||null,dateKey:n.dateKey||TODAY,date:n.date||TODAY_DISPLAY,text:n.text||''});});
    (imported.dayNotes||[]).forEach(function(n){STATE.coachingNotes.push({id:STATE.noteId++,traineeId:n.traineeId||null,dateKey:n.dateKey||TODAY,date:n.date||TODAY_DISPLAY,text:n.text||''});});
    (imported.leadLogs||[]).forEach(function(n){STATE.coachingNotes.push({id:STATE.noteId++,traineeId:n.traineeId||null,dateKey:n.dateKey||TODAY,date:n.date||TODAY_DISPLAY,text:n.text||''});});
  }
  localStorage.setItem('coaching_v8',JSON.stringify(STATE));
  closeImportModal();showPage('home');updateNav();buildSidebar();
}catch(err){alert('Error importing file: '+err.message);}};
reader.readAsText(file);
}

// CALL REVIEW
let crCollapsed = {};

function renderCallReview(){
const reviews = STATE.callReviews;
const traineesWithReviews = STATE.trainees.filter(function(t){return reviews.some(function(r){return r.traineeId===t.id;});});
const noTraineeReviews = reviews.filter(function(r){return !r.traineeId;});

function accordionSection(traineeId, traineeName, sectionReviews){
var sKey = 'cr-acc-' + (traineeId||'none');
var isCollapsed = !!crCollapsed[sKey];
var pending = sectionReviews.filter(function(r){return !r.reviewed;}).length;
var done = sectionReviews.filter(function(r){return r.reviewed;}).length;
var total = sectionReviews.length;
var sorted = sectionReviews.slice().sort(function(a,b){if(a.reviewed !== b.reviewed) return a.reviewed ? 1 : -1;return (a.name||'').localeCompare(b.name||'');});
var progressHtml = total?'<div style="display:flex;align-items:center;gap:10px;padding:10px 0 6px"><div style="flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+Math.round(done/total*100)+'%;background:linear-gradient(90deg,var(--teal),var(--green));border-radius:3px;transition:width .3s"></div></div><span style="font-size:10px;color:var(--text-dim);font-family:\'IBM Plex Mono\',monospace;white-space:nowrap">'+done+'/'+total+'</span></div>':'';
var leadsHtml = sorted.map(function(r){return crLeadRow(r);}).join('');
var tid = traineeId || '';
var addBtn = '<button class="btn-secondary btn-sm" onclick="openCrModal('+tid+');event.stopPropagation();" style="font-size:11px;padding:4px 10px">+ add lead</button>';
var clearDoneBtn = done > 0 ? '<button class="cr-clear-btn" onclick="crClearReviewed('+(traineeId||'null')+');event.stopPropagation();">clear reviewed</button>' : '';
var clearAllBtn = total > 0 ? '<button style="font-size:11px;padding:4px 10px;background:rgba(194,59,42,.1);color:var(--red);border:1px solid rgba(194,59,42,.25);border-radius:6px;cursor:pointer;font-family:\'IBM Plex Mono\',monospace" onclick="crDeleteAll('+(traineeId||'null')+');event.stopPropagation();">delete all</button>' : '';
return '<div class="cr-accordion">'+
'<div class="cr-accordion-header" onclick="crToggleAccordion(''+sKey+'')">'+
'<div class="cr-accordion-title">'+esc(traineeName)+(pending?'<span class="badge amber">'+pending+' pending</span>':'<span class="badge" style="background:rgba(90,138,106,.2);color:var(--teal)">done \u2713</span>')+'</div>'+
'<div class="cr-accordion-actions">'+addBtn+(done>0?clearDoneBtn:'')+(total>0?clearAllBtn:'')+'<span class="cr-accordion-toggle" style="margin-left:6px">'+(isCollapsed?'\u25B6':'\u25BC')+'</span></div>'+
'</div>'+
'<div class="cr-accordion-body'+(isCollapsed?' cr-collapsed':'')+'">'+progressHtml+(total?leadsHtml:'<div class="cr-empty" style="padding:20px 0 16px;text-align:center"><div style="font-size:22px;margin-bottom:6px">\u{1F4CB}</div>No leads yet.</div>')+'</div>'+
'</div>';
}

var sections = traineesWithReviews.map(function(t){return accordionSection(t.id, t.name, reviews.filter(function(r){return r.traineeId===t.id;}));}).join('');
if(noTraineeReviews.length){sections += accordionSection(null, 'Unassigned', noTraineeReviews);}
var totalPending = reviews.filter(function(r){return !r.reviewed;}).length;

return '<h1 class="page-title">\u{1F4CB} Call Review</h1>'+
'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">'+
'<div style="font-size:13px;color:var(--text-dim)">Go through leads before meeting with a trainee</div>'+
'<div style="display:flex;gap:8px">'+
(totalPending===0&&reviews.length?'<button class="btn-secondary btn-sm" onclick="crDeleteAllEverything()" style="color:var(--red)">clear everything</button>':'')+
'<button class="btn-primary" onclick="openCrModal()">+ add lead</button>'+
'</div>'+
'</div>'+
(sections || '<div class="card"><div class="cr-empty"><div style="font-size:32px;margin-bottom:12px">\u{1F4CB}</div><div>No leads yet.</div><div style="margin-top:8px;font-size:13px">Click "+ add lead" to start your call review list.</div></div></div>');
}

function crToggleAccordion(sKey){crCollapsed[sKey]=!crCollapsed[sKey];showPage('callreview');}

function crLeadRow(r){
var metaParts=[];if(r.callDate)metaParts.push(r.callDate);if(r.callTime)metaParts.push(fmtTime(r.callTime));var metaStr=metaParts.join(' at ');
return '<div class="cr-lead'+(r.reviewed?' reviewed':'')+'">'+
'<div class="cr-cb'+(r.reviewed?' checked':'')+'" onclick="crToggle('+r.id+')" title="'+(r.reviewed?'Mark pending':'Mark reviewed')+'"></div>'+
'<div class="cr-lead-body"><div class="cr-lead-name'+(r.reviewed?' reviewed-text':'')+'">'+esc(r.name)+'</div>'+
(metaStr?'<div class="cr-lead-meta">'+esc(metaStr)+'</div>':'')+
(r.note?'<div class="cr-lead-note">'+esc(r.note)+'</div>':'')+
'</div>'+
'<div class="cr-actions"><button class="edit-btn" onclick="openCrEditModal('+r.id+')" title="Edit">\u270F</button><button class="del-btn" onclick="deleteCrLead('+r.id+')" title="Delete">\u2715</button></div>'+
'</div>';
}

function crToggle(id){var r=STATE.callReviews.find(function(x){return x.id===id;});if(r)r.reviewed=!r.reviewed;save();showPage('callreview');}
function deleteCrLead(id){if(!confirm('Delete this lead?'))return;STATE.callReviews=STATE.callReviews.filter(function(r){return r.id!==id;});save();showPage('callreview');}
function crClearReviewed(traineeId){
var isNull=(traineeId===null||traineeId==='null'||traineeId===undefined);
if(!confirm('Remove reviewed leads'+(isNull?'':' for this trainee')+' from the list?'))return;
if(isNull){STATE.callReviews=STATE.callReviews.filter(function(r){return !r.reviewed||!!r.traineeId;});}
else{STATE.callReviews=STATE.callReviews.filter(function(r){return !(r.traineeId===traineeId&&r.reviewed);});}
save();showPage('callreview');
}
function crDeleteAll(traineeId){
var isNull=(traineeId===null||traineeId==='null'||traineeId===undefined);
var name=isNull?'unassigned':((STATE.trainees.find(function(t){return t.id===traineeId;})||{name:'this trainee'}).name);
if(!confirm('Delete ALL leads for '+name+'?\nUse this after the meeting is done.'))return;
if(isNull){STATE.callReviews=STATE.callReviews.filter(function(r){return !!r.traineeId;});}
else{STATE.callReviews=STATE.callReviews.filter(function(r){return r.traineeId!==traineeId;});}
save();showPage('callreview');
}
function crDeleteAllEverything(){if(!confirm('Clear ALL leads from every trainee?'))return;STATE.callReviews=[];save();showPage('callreview');}

function openCrModal(prefillTraineeId){
document.getElementById('cr-modal-title').textContent='\u{1F4CB} Add Lead to Review';
document.getElementById('m-cr-edit-id').value='';document.getElementById('m-cr-name').value='';
document.getElementById('m-cr-date').value='';document.getElementById('m-cr-time').value='';document.getElementById('m-cr-note').value='';
var sel=document.getElementById('m-cr-trainee');
sel.innerHTML='<option value="">\u2014 select trainee \u2014</option>'+STATE.trainees.map(function(t){return '<option value="'+t.id+'">'+esc(t.name)+'</option>';}).join('');
var useId=(prefillTraineeId!==undefined&&prefillTraineeId!==null&&prefillTraineeId!=='')?prefillTraineeId:'';
sel.value=(useId!==null&&useId!==undefined&&useId!=='')?String(useId):'';
document.getElementById('cr-modal').classList.add('open');document.getElementById('m-cr-name').focus();
}
function openCrEditModal(id){
var r=STATE.callReviews.find(function(x){return x.id===id;});if(!r)return;
document.getElementById('cr-modal-title').textContent='\u270F Edit Lead';
document.getElementById('m-cr-edit-id').value=id;document.getElementById('m-cr-name').value=r.name||'';
document.getElementById('m-cr-date').value=r.callDate||'';document.getElementById('m-cr-time').value=r.callTime||'';document.getElementById('m-cr-note').value=r.note||'';
var sel=document.getElementById('m-cr-trainee');
sel.innerHTML='<option value="">\u2014 select trainee \u2014</option>'+STATE.trainees.map(function(t){return '<option value="'+t.id+'">'+esc(t.name)+'</option>';}).join('');
sel.value=r.traineeId?String(r.traineeId):'';
document.getElementById('cr-modal').classList.add('open');document.getElementById('m-cr-name').focus();
}
function closeCrModal(){document.getElementById('cr-modal').classList.remove('open');}
function saveCrLead(){
var name=document.getElementById('m-cr-name').value.trim();if(!name){alert('Enter a lead name');return;}
var traineeIdVal=document.getElementById('m-cr-trainee').value;var traineeId=traineeIdVal?parseInt(traineeIdVal):null;
var callDate=document.getElementById('m-cr-date').value;var callTime=document.getElementById('m-cr-time').value;
var note=document.getElementById('m-cr-note').value.trim();var editId=document.getElementById('m-cr-edit-id').value;
if(editId){var r=STATE.callReviews.find(function(x){return x.id===parseInt(editId);});if(r){r.name=name;r.traineeId=traineeId;r.callDate=callDate;r.callTime=callTime;r.note=note;}}
else{STATE.callReviews.push({id:STATE.noteId++,name,traineeId,callDate,callTime,note,reviewed:false,added:TODAY});}
save();closeCrModal();showPage('callreview');
}

function buildSidebar(){
const todaySched=STATE.scheduleEntries.filter(function(e){return e.dateKey===TODAY;}).length;
const pendingCr=STATE.callReviews.filter(function(r){return !r.reviewed;}).length;
const sidebar=document.getElementById('sidebar');
sidebar.innerHTML='<div class="sidebar-section">Navigation</div>'+
'<div class="sidebar-item '+(currentPage==='home'?'active':'')+'" onclick="showPage('home')">Home</div>'+
'<div class="sidebar-item '+(currentPage==='schedule'?'active':'')+'" onclick="showPage('schedule')"><span>Schedule</span>'+(todaySched?'<span class="sidebar-count">'+todaySched+'</span>':'')+' </div>'+
'<div class="sidebar-item '+(currentPage==='callreview'?'active':'')+'" onclick="showPage('callreview')"><span>Call Review</span>'+(pendingCr?'<span class="sidebar-count">'+pendingCr+'</span>':'')+' </div>'+
'<div class="sidebar-item '+(currentPage==='calendar'?'active':'')+'" onclick="showPage('calendar')">Calendar</div>'+
'<div class="sidebar-item '+(currentPage==='yaakov'?'active':'')+'" onclick="showPage('yaakov')">Yaakov</div>'+
'<div class="sidebar-section" style="margin-top:16px">Trainees</div>'+
STATE.trainees.map(function(t){return '<div class="sidebar-item '+(currentPage==='trainee-'+t.id?'active':'')+'" onclick="showPage('trainee-'+t.id+'')">'+esc(t.name)+'</div>';}).join('')+
'<div class="sidebar-item sidebar-add" onclick="addTrainee()">+ add trainee</div>';
}
load();buildSidebar();showPage('home');
window.addEventListener('beforeunload',save);
</script>
</body>
</html>
