<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coaching Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-dark:#0f0e0b;
  --bg-card:#1a1815;
  --bg-hover:#242118;
  --border:#2a261f;
  --text:#e8e4db;
  --text-dim:#9a9187;
  --accent:#d4a574;
  --accent-light:#e8c5a0;
  --accent-dark:#8b6f47;
  --green:#6fb583;
  --red:#c97070;
  --blue:#7ba8d1;
  --amber:#d4a574;
  --purple:#b8a8d1;
}
html,body{height:100%;margin:0;padding:0;background:var(--bg-dark);color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;line-height:1.6;overflow:hidden}

.app{display:flex;height:100vh;flex-direction:column}
.header{height:56px;background:linear-gradient(135deg,#1a1815 0%,#0f0e0b 100%);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;justify-content:space-between;flex-shrink:0;z-index:100}
.logo{font-size:18px;font-weight:700;letter-spacing:1px;background:linear-gradient(135deg,var(--accent-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-dots{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.nav-btn{background:none;border:none;color:var(--text-dim);font-size:12px;padding:6px 12px;cursor:pointer;border-radius:6px;transition:all .2s;font-family:'IBM Plex Mono',monospace;font-weight:500}
.nav-btn:hover{background:var(--border);color:var(--accent)}
.nav-btn.active{color:var(--accent);background:rgba(212,165,116,.1)}
.save-ind{font-size:10px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace}

.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:200px;background:var(--bg-card);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;flex-shrink:0}
.sidebar-section{padding:12px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);border-bottom:1px solid var(--border);margin-bottom:4px}
.sidebar-item{padding:10px 16px;font-size:13px;cursor:pointer;color:var(--text-dim);transition:all .15s;border-left:3px solid transparent;display:flex;align-items:center;gap:8px;justify-content:space-between}
.sidebar-item:hover{background:var(--bg-hover);color:var(--text)}
.sidebar-item.active{border-left-color:var(--accent);color:var(--accent);background:rgba(212,165,116,.08)}
.sidebar-badge{font-size:10px;background:var(--accent);color:var(--bg-dark);padding:2px 6px;border-radius:3px;font-weight:600}

.content{flex:1;overflow-y:auto;padding:32px 40px;max-width:1000px}
.page{display:none}
.page.active{display:block;animation:fadeIn .25s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── CARDS & SECTIONS ── */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.card-title{font-size:14px;font-weight:700;color:var(--accent-light);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.card-action{font-size:12px;color:var(--accent);cursor:pointer;background:none;border:none;font-family:'Outfit',sans-serif;font-weight:500;padding:0}
.card-action:hover{color:var(--accent-light)}

/* ── HOME LAYOUT ── */
.home-three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;margin-bottom:24px}
.home-two{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
@media(max-width:1200px){.home-three{grid-template-columns:1fr 1fr}.home-two{grid-template-columns:1fr}}
@media(max-width:900px){.home-three{grid-template-columns:1fr}.home-two{grid-template-columns:1fr}}

.section-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:18px}
.section-title{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--accent-light)}

/* ── CHECKLIST ── */
.task-group{margin-bottom:18px}
.task-group-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:6px}
.checklist-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;cursor:pointer;transition:opacity .15s}
.checklist-item:hover{opacity:.8}
.cb{width:18px;height:18px;border:1.5px solid var(--border);border-radius:5px;background:var(--bg-dark);cursor:pointer;transition:all .15s;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px}
.cb:hover{border-color:var(--accent)}
.cb.on{background:var(--green);border-color:var(--green)}
.cb.on::after{content:'✓';color:#fff;font-size:9px;font-weight:700}
.checklist-item.done .cb-text{text-decoration:line-through;color:var(--text-dim)}
.cb-text{flex:1;font-size:13px;line-height:1.4}

/* ── TRAINEES ── */
.trainee-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(212,165,116,.1);border:1px solid var(--border);border-radius:8px;margin-right:8px;margin-bottom:8px;cursor:pointer;transition:all .2s;font-size:13px}
.trainee-pill:hover{background:rgba(212,165,116,.2);border-color:var(--accent)}
.trainee-pill.onboard{background:rgba(184,168,209,.1);border-color:rgba(184,168,209,.3)}
.trainee-pill.onboard:hover{background:rgba(184,168,209,.2);border-color:var(--purple)}
.trainee-av{width:24px;height:24px;border-radius:50%;background:var(--accent);color:var(--bg-dark);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.trainee-av.onboard{background:var(--purple)}

/* ── INPUTS ── */
input[type=text],input[type=date],textarea,select{
  width:100%;padding:10px 12px;background:var(--bg-dark);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;transition:border .15s;margin-bottom:8px
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}

/* ── BUTTONS ── */
.btn-primary{padding:10px 16px;background:var(--accent);color:var(--bg-dark);border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;transition:all .2s}
.btn-primary:hover{background:var(--accent-light)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{padding:10px 14px;background:var(--border);color:var(--text);border:none;border-radius:8px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;transition:all .2s}
.btn-secondary:hover{background:var(--bg-hover)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#a85656}

/* ── NOTES INBOX ── */
.note-card{background:var(--bg-dark);border-left:4px solid var(--accent);padding:14px;border-radius:6px;margin-bottom:10px}
.note-card.unassigned{border-left-color:var(--amber)}
.note-date{font-size:10px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;margin-bottom:6px}
.note-text{font-size:13px;line-height:1.5;margin-bottom:8px;word-break:break-word}
.note-actions{display:flex;gap:6px;flex-wrap:wrap}
.note-btn{font-size:11px;padding:4px 8px;background:var(--border);color:var(--text-dim);border:none;border-radius:4px;cursor:pointer;transition:all .15s}
.note-btn:hover{background:var(--accent);color:var(--bg-dark)}

/* ── CALENDAR ── */
.calendar-month{margin-bottom:20px}
.cal-header{font-size:14px;font-weight:700;color:var(--accent-light);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.cal-nav{display:flex;gap:8px}
.cal-nav button{background:var(--border);border:none;color:var(--text-dim);padding:4px 8px;border-radius:4px;cursor:pointer;font-size:11px}
.cal-nav button:hover{background:var(--accent);color:var(--bg-dark)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:12px}
.cal-day{aspect-ratio:1;background:var(--bg-dark);border:1px solid var(--border);border-radius:6px;padding:6px;font-size:11px;text-align:center;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center}
.cal-day:hover{border-color:var(--accent)}
.cal-day.today{border-color:var(--accent);background:rgba(212,165,116,.15)}
.cal-day.has-meetings{background:rgba(107,181,131,.15)}
.cal-day-num{font-weight:700}
.cal-day-count{font-size:9px;color:var(--text-dim)}

/* ── MEETING LOG ── */
.meeting-entry{background:var(--bg-dark);border-left:3px solid var(--green);padding:12px;border-radius:6px;margin-bottom:10px;font-size:13px;line-height:1.5}
.meeting-names{font-weight:600;color:var(--accent-light);margin-bottom:4px}
.meeting-notes{color:var(--text-dim);margin-bottom:6px;font-size:12px;font-style:italic}
.meeting-meta{font-size:10px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace}

/* ── TRAINEE DETAIL ── */
.trainee-header{background:linear-gradient(135deg,rgba(212,165,116,.15),rgba(184,168,209,.1));border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px;display:flex;align-items:center;gap:20px}
.tr-avatar{width:64px;height:64px;border-radius:50%;background:var(--accent);color:var(--bg-dark);font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tr-avatar.onboard{background:var(--purple)}
.tr-info h2{font-size:20px;font-weight:700;margin-bottom:4px}
.tr-type{font-size:11px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.5px}

.split-section{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:900px){.split-section{grid-template-columns:1fr}}

.note-item{background:var(--bg-dark);border-left:3px solid var(--accent);padding:12px;border-radius:6px;margin-bottom:10px;font-size:13px;line-height:1.5}
.note-item.call{border-left-color:var(--blue)}
.note-item.todo{border-left-color:var(--green)}
.note-date-small{font-size:10px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;margin-bottom:4px}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:24px;width:500px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--accent-light)}
.modal-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);display:block;margin-bottom:6px;margin-top:12px}
.modal-label:first-of-type{margin-top:0}
.modal-buttons{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* ── QUICK ADD ── */
.quick-add-btn{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:var(--bg-dark);border:none;font-size:24px;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(212,165,116,.3);z-index:50}
.quick-add-btn:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(212,165,116,.4)}

.empty-state{text-align:center;padding:20px;color:var(--text-dim);font-size:13px}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg-dark)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim)}

.badge{display:inline-block;font-size:10px;background:var(--accent);color:var(--bg-dark);padding:2px 6px;border-radius:3px;font-weight:600;margin-left:6px}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo">coaching hub</div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="nav-dots" id="nav-buttons"></div>
      <div class="save-ind" id="save-indicator">saved</div>
    </div>
  </div>

  <div class="main">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- ADD NOTE MODAL -->
<div class="modal-overlay" id="add-note-modal">
  <div class="modal-box">
    <div class="modal-title">➕ Add Note</div>
    <label class="modal-label">Your note</label>
    <textarea id="m-note-text" style="width:100%;min-height:100px"></textarea>
    <label class="modal-label">Category</label>
    <select id="m-note-cat" style="width:100%">
      <option value="">--unassigned--</option>
      <option value="trainee">Trainee coaching</option>
      <option value="system">System / daily process</option>
      <option value="agency">Agency business</option>
      <option value="other">Other</option>
    </select>
    <div class="modal-buttons">
      <button class="btn-secondary" onclick="closeAddNoteModal()">cancel</button>
      <button class="btn-primary" onclick="saveNewNote()">save</button>
    </div>
  </div>
</div>

<!-- LOG MEETING MODAL -->
<div class="modal-overlay" id="log-meeting-modal">
  <div class="modal-box">
    <div class="modal-title">📅 Log Meeting</div>
    <label class="modal-label">Date</label>
    <input type="date" id="m-meet-date">
    <label class="modal-label">Who you met with (names)</label>
    <input type="text" id="m-meet-names" placeholder="Cameron, Joshua, Astra">
    <label class="modal-label">What you covered</label>
    <textarea id="m-meet-notes" style="width:100%;min-height:80px" placeholder="Key points from the meeting..."></textarea>
    <div class="modal-buttons">
      <button class="btn-secondary" onclick="closeLogMeetingModal()">cancel</button>
      <button class="btn-primary" onclick="saveLogMeeting()">log it</button>
    </div>
  </div>
</div>

<button class="quick-add-btn" onclick="openAddNoteModal()">+</button>

<script>
// ── STATE ──
let STATE = {
  trainees: [],
  notes: [],
  meetings: [],
  dailyTasks: { trainees: [], system: [], agency: [] },
  noteId: 1,
  traineeId: 1,
};

const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const NOW = new Date();
const TODAY = NOW.toISOString().slice(0,10);
const TODAY_DISPLAY = `${MONTHS[NOW.getMonth()]} ${NOW.getDate()}, ${NOW.getFullYear()}`;

// ── LOAD/SAVE ──
function load() {
  try {
    const saved = localStorage.getItem('coaching_v2');
    if (saved) STATE = JSON.parse(saved);
  } catch(e) {}
  
  if (!STATE.trainees) STATE.trainees = [];
  if (!STATE.notes) STATE.notes = [];
  if (!STATE.meetings) STATE.meetings = [];
  if (!STATE.dailyTasks) STATE.dailyTasks = { trainees: [], system: [], agency: [] };
  
  document.getElementById('save-indicator').textContent = 'loaded';
}

function save() {
  try {
    localStorage.setItem('coaching_v2', JSON.stringify(STATE));
    document.getElementById('save-indicator').textContent = 'saved';
  } catch(e) {
    document.getElementById('save-indicator').textContent = 'error';
  }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function initials(n) { return n.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0,2); }

// ── NAVIGATION ──
let currentPage = 'home';

function showPage(name) {
  currentPage = name;
  const content = document.getElementById('content');
  content.innerHTML = renderPage(name);
  updateNav();
}

function updateNav() {
  const nav = document.getElementById('nav-buttons');
  const items = [
    {id:'home',label:'Home'},
    {id:'notes',label:'Notes',count:STATE.notes.filter(n=>!n.traineeId).length},
    {id:'calendar',label:'Calendar'},
    {id:'yaakov',label:'Yaakov'},
  ];
  STATE.trainees.forEach(t => items.push({id:'trainee-'+t.id,label:t.name}));
  
  nav.innerHTML = items.map(item => `
    <button class="nav-btn ${currentPage === item.id ? 'active' : ''}" onclick="showPage('${item.id}')">
      ${esc(item.label)}
      ${item.count ? `<span style="font-size:10px;color:var(--accent)">${item.count}</span>` : ''}
    </button>
  `).join('');
}

function renderPage(name) {
  if (name === 'home') return renderHome();
  if (name === 'notes') return renderNotesInbox();
  if (name === 'calendar') return renderCalendar();
  if (name === 'yaakov') return renderYaakov();
  if (name.startsWith('trainee-')) {
    const id = parseInt(name.split('-')[1]);
    const tr = STATE.trainees.find(t => t.id === id);
    return tr ? renderTraineeDetail(tr) : '<div class="empty-state">Trainee not found</div>';
  }
  return '';
}

// ── HOME PAGE ──
function renderHome() {
  const todayTrainees = STATE.trainees.filter(t => t.todayMeeting);
  const unassignedNotes = STATE.notes.filter(n => !n.traineeId).length;
  const pendingTodos = STATE.dailyTasks.trainees.filter(t => !t.done).length +
                       STATE.dailyTasks.system.filter(t => !t.done).length +
                       STATE.dailyTasks.agency.filter(t => !t.done).length;
  
  return `
    <h1 style="font-size:24px;font-weight:700;margin-bottom:24px;color:var(--accent-light)">Today's View</h1>
    
    <div class="home-three">
      <div class="section-box">
        <div class="section-title">👥 Meeting Today</div>
        ${todayTrainees.length > 0 ? todayTrainees.map(t => `
          <div class="trainee-pill ${t.type === 'onboard' ? 'onboard' : ''}" onclick="showPage('trainee-${t.id}')">
            <div class="trainee-av ${t.type === 'onboard' ? 'onboard' : ''}">${initials(t.name)}</div>
            ${esc(t.name)}
          </div>
        `).join('') : '<div style="color:var(--text-dim);font-size:13px">No meetings scheduled</div>'}
        <button class="btn-secondary" style="width:100%;margin-top:12px" onclick="editTodayMeetings()">edit schedule</button>
      </div>
      
      <div class="section-box">
        <div class="section-title">📝 Quick Notes<span class="badge">${unassignedNotes}</span></div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:12px">Unassigned notes waiting</div>
        ${unassignedNotes > 0 ? `<button class="btn-primary" style="width:100%" onclick="showPage('notes')">assign them</button>` : '<div class="empty-state" style="padding:12px 0">All caught up!</div>'}
      </div>
      
      <div class="section-box">
        <div class="section-title">✅ To-Do's<span class="badge">${pendingTodos}</span></div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:12px">Tasks pending today</div>
        <button class="btn-primary" style="width:100%" onclick="showPage('home');document.getElementById('tasks-anchor').scrollIntoView()">view tasks</button>
      </div>
    </div>

    <div id="tasks-anchor"></div>
    <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;margin-top:32px;color:var(--accent-light)">Today's Tasks</h2>
    
    <div class="home-two">
      <div class="card">
        <div class="card-title">With Trainees</div>
        ${renderTaskGroup(STATE.dailyTasks.trainees, 'trainee')}
        <input type="text" placeholder="Add task..." onkeydown="if(event.key==='Enter'){addTask('trainees',this.value);this.value='';}">
      </div>
      
      <div class="card">
        <div class="card-title">System / Process</div>
        ${renderTaskGroup(STATE.dailyTasks.system, 'system')}
        <input type="text" placeholder="Add task..." onkeydown="if(event.key==='Enter'){addTask('system',this.value);this.value='';}">
      </div>
      
      <div class="card">
        <div class="card-title">Agency Business</div>
        ${renderTaskGroup(STATE.dailyTasks.agency, 'agency')}
        <input type="text" placeholder="Add task..." onkeydown="if(event.key==='Enter'){addTask('agency',this.value);this.value='';}">
      </div>
      
      <div class="card">
        <div class="card-title">Expectations / Results</div>
        <p style="font-size:12px;color:var(--text-dim);margin-bottom:10px">What do you want to see happen today?</p>
        <textarea id="expect-notes" style="width:100%;min-height:100px" placeholder="Who needs to close what? What metrics matter? Any constraints?"></textarea>
        <button class="btn-primary" style="width:100%;margin-top:8px" onclick="saveExpectations()">save expectations</button>
      </div>
    </div>
  `;
}

function renderTaskGroup(tasks, type) {
  const todo = tasks.filter(t => !t.done);
  const done = tasks.filter(t => t.done);
  let html = '';
  
  if (todo.length > 0) {
    html += todo.map(t => `
      <div class="checklist-item" onclick="toggleTask('${type}',${t.id})">
        <div class="cb"></div>
        <div class="cb-text">${esc(t.text)}</div>
      </div>
    `).join('');
  }
  
  if (done.length > 0) {
    html += done.map(t => `
      <div class="checklist-item done" onclick="toggleTask('${type}',${t.id})">
        <div class="cb on"></div>
        <div class="cb-text">${esc(t.text)}</div>
      </div>
    `).join('');
  }
  
  if (tasks.length === 0) {
    html = '<div class="empty-state" style="padding:8px 0">No tasks yet</div>';
  }
  
  return html;
}

function toggleTask(category, id) {
  const tasks = STATE.dailyTasks[category];
  const task = tasks.find(t => t.id === id);
  if (task) task.done = !task.done;
  save();
  showPage('home');
}

function addTask(category, text) {
  if (!text.trim()) return;
  STATE.dailyTasks[category].push({ id: STATE.noteId++, text, done: false });
  save();
  showPage('home');
}

function saveExpectations() {
  const text = document.getElementById('expect-notes').value;
  // Could save this somewhere, for now just acknowledge
  if (text.trim()) {
    alert('Expectations saved in your notes');
    document.getElementById('expect-notes').value = '';
  }
}

function editTodayMeetings() {
  let html = '<div class="modal-box"><div class="modal-title">Who are you meeting today?</div>';
  html += STATE.trainees.map(t => `
    <label style="display:flex;align-items:center;gap:8px;padding:8px 0;cursor:pointer;font-size:13px">
      <input type="checkbox" ${t.todayMeeting ? 'checked' : ''} onchange="toggleTodayMeeting(${t.id})">
      ${esc(t.name)}
    </label>
  `).join('');
  html += '<div class="modal-buttons"><button class="btn-secondary" onclick="closeEditModal()">done</button></div>';
  html += '</div>';
  document.getElementById('add-note-modal').innerHTML = html;
  document.getElementById('add-note-modal').classList.add('open');
}

function closeEditModal() {
  document.getElementById('add-note-modal').classList.remove('open');
  save();
  showPage('home');
}

function toggleTodayMeeting(id) {
  const tr = STATE.trainees.find(t => t.id === id);
  if (tr) tr.todayMeeting = !tr.todayMeeting;
  save();
}

// ── NOTES INBOX ──
function renderNotesInbox() {
  const unassigned = STATE.notes.filter(n => !n.traineeId);
  
  return `
    <h1 style="font-size:24px;font-weight:700;margin-bottom:24px;color:var(--accent-light)">Unassigned Notes</h1>
    
    ${unassigned.length === 0 ? '<div class="empty-state">All notes assigned!</div>' : ''}
    
    ${unassigned.map(n => `
      <div class="note-card unassigned">
        <div class="note-date">${n.date} • ${n.category || 'unassigned'}</div>
        <div class="note-text">${esc(n.text)}</div>
        <div class="note-actions">
          ${STATE.trainees.length > 0 ? `
            <select style="font-size:11px;padding:4px 8px;background:var(--border);border:none;color:var(--text-dim);border-radius:4px;cursor:pointer" onchange="assignNoteToTrainee(${n.id},this.value);this.value='';">
              <option value="">assign to...</option>
              ${STATE.trainees.map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('')}
            </select>
          ` : ''}
          <button class="note-btn" onclick="deleteNote(${n.id})">delete</button>
        </div>
      </div>
    `).join('')}
  `;
}

function assignNoteToTrainee(noteId, traineeId) {
  if (!traineeId) return;
  const note = STATE.notes.find(n => n.id === noteId);
  const tr = STATE.trainees.find(t => t.id === parseInt(traineeId));
  if (note && tr) {
    note.traineeId = tr.id;
    tr.notes = tr.notes || [];
    tr.notes.push({...note});
    STATE.notes = STATE.notes.filter(n => n.id !== noteId);
    save();
    showPage('notes');
  }
}

function deleteNote(id) {
  STATE.notes = STATE.notes.filter(n => n.id !== id);
  save();
  showPage('notes');
}

// ── CALENDAR ──
function renderCalendar() {
  const meetings = STATE.meetings;
  let html = '<h1 style="font-size:24px;font-weight:700;margin-bottom:24px;color:var(--accent-light)">Meeting History</h1>';
  
  // Group by date
  const byDate = {};
  meetings.forEach(m => {
    if (!byDate[m.date]) byDate[m.date] = [];
    byDate[m.date].push(m);
  });
  
  const sortedDates = Object.keys(byDate).sort().reverse();
  
  if (sortedDates.length === 0) {
    html += '<div class="empty-state">No meetings logged yet</div><button class="btn-primary" onclick="openLogMeetingModal()">Log a meeting</button>';
  } else {
    html += '<button class="btn-primary" style="margin-bottom:20px" onclick="openLogMeetingModal()">+ Log meeting</button>';
    sortedDates.forEach(date => {
      html += `<div class="card">
        <div class="card-title" style="font-size:14px">${date}</div>
        ${byDate[date].map(m => `
          <div class="meeting-entry">
            <div class="meeting-names">Met with: ${esc(m.names)}</div>
            ${m.notes ? `<div class="meeting-notes">${esc(m.notes)}</div>` : ''}
            <div class="meeting-meta">logged</div>
          </div>
        `).join('')}
      </div>`;
    });
  }
  
  return html;
}

// ── YAAKOV ──
function renderYaakov() {
  return `
    <h1 style="font-size:24px;font-weight:700;margin-bottom:24px;color:var(--accent-light)">Yaakov Notes & Direction</h1>
    <div class="card">
      <div class="card-title">Latest direction from your boss</div>
      ${STATE.notes.filter(n => n.yaakov).length === 0 ? '<div class="empty-state">No notes yet</div>' : ''}
      ${STATE.notes.filter(n => n.yaakov).map(n => `
        <div class="note-card" style="border-left-color:var(--amber)">
          <div class="note-date">${n.date}</div>
          <div class="note-text">${esc(n.text)}</div>
          <button class="note-btn" onclick="deleteNote(${n.id})">delete</button>
        </div>
      `).join('')}
    </div>
    <div class="card">
      <div class="card-title">Add direction</div>
      <textarea id="yaakov-input" style="width:100%;min-height:100px" placeholder="What did Yaakov tell you? What's he expecting?"></textarea>
      <button class="btn-primary" style="width:100%" onclick="saveYaakovNote()">save</button>
    </div>
  `;
}

function saveYaakovNote() {
  const text = document.getElementById('yaakov-input').value.trim();
  if (!text) return;
  STATE.notes.push({
    id: STATE.noteId++,
    date: TODAY_DISPLAY,
    text,
    yaakov: true,
    traineeId: null,
  });
  save();
  document.getElementById('yaakov-input').value = '';
  showPage('yaakov');
}

// ── TRAINEE DETAIL ──
function renderTraineeDetail(tr) {
  const trainerNotes = tr.notes || [];
  
  return `
    <div class="trainee-header">
      <div class="tr-avatar ${tr.type === 'onboard' ? 'onboard' : ''}">${initials(tr.name)}</div>
      <div class="tr-info">
        <h2>${esc(tr.name)}</h2>
        <div class="tr-type">${tr.type === 'onboard' ? 'New Hire / Onboarding' : 'Trainee'}</div>
      </div>
    </div>
    
    <div class="split-section">
      <div class="card">
        <div class="card-title">📝 Coaching Notes</div>
        ${trainerNotes.length === 0 ? '<div class="empty-state">No notes yet</div>' : ''}
        ${trainerNotes.map(n => `
          <div class="note-item">
            <div class="note-date-small">${n.date}</div>
            ${esc(n.text)}
          </div>
        `).join('')}
      </div>
      
      <div class="card">
        <div class="card-title">💬 Call Reviews</div>
        ${tr.calls && tr.calls.length > 0 ? tr.calls.map(c => `
          <div class="note-item call">
            <div class="note-date-small">${c.date} • ${esc(c.name)}</div>
            ${esc(c.notes)}
          </div>
        `).join('') : '<div class="empty-state">No call reviews yet</div>'}
        <button class="btn-secondary" style="width:100%;margin-top:12px" onclick="addCallReview(${tr.id})">+ add call review</button>
      </div>
    </div>
    
    <div class="card">
      <div class="card-title">✅ To-Do List for ${esc(tr.name)}</div>
      ${renderTaskGroup(tr.todos || [], 'trainee-' + tr.id)}
      <input type="text" placeholder="Add task for them..." onkeydown="if(event.key==='Enter'){addTraineeTodo(${tr.id},this.value);this.value='';}">
    </div>
    
    <button class="btn-danger" style="width:100%;margin-top:20px" onclick="removeTrainee(${tr.id})">Remove Trainee</button>
  `;
}

// ── ACTIONS ──
function openAddNoteModal() {
  document.getElementById('m-note-text').value = '';
  document.getElementById('m-note-cat').value = '';
  document.getElementById('add-note-modal').classList.add('open');
  document.getElementById('m-note-text').focus();
}

function closeAddNoteModal() {
  document.getElementById('add-note-modal').classList.remove('open');
}

function saveNewNote() {
  const text = document.getElementById('m-note-text').value.trim();
  const cat = document.getElementById('m-note-cat').value;
  if (!text) return;
  STATE.notes.push({
    id: STATE.noteId++,
    date: TODAY_DISPLAY,
    text,
    category: cat,
    traineeId: null,
  });
  save();
  closeAddNoteModal();
  showPage('notes');
}

function openLogMeetingModal() {
  const today = NOW.toISOString().slice(0,10);
  document.getElementById('m-meet-date').value = today;
  document.getElementById('m-meet-names').value = '';
  document.getElementById('m-meet-notes').value = '';
  document.getElementById('log-meeting-modal').classList.add('open');
}

function closeLogMeetingModal() {
  document.getElementById('log-meeting-modal').classList.remove('open');
}

function saveLogMeeting() {
  const date = document.getElementById('m-meet-date').value;
  const names = document.getElementById('m-meet-names').value.trim();
  const notes = document.getElementById('m-meet-notes').value.trim();
  
  if (!date || !names) {
    alert('Fill in date and who you met with');
    return;
  }
  
  STATE.meetings.push({
    id: STATE.noteId++,
    date,
    names,
    notes,
  });
  save();
  closeLogMeetingModal();
  showPage('calendar');
}

function addTrainee() {
  const name = prompt('Trainee name:');
  if (!name) return;
  const type = confirm('New hire/onboarding? (OK=yes, Cancel=regular trainee)') ? 'onboard' : 'trainee';
  STATE.trainees.push({
    id: STATE.traineeId++,
    name,
    type,
    todayMeeting: false,
    notes: [],
    calls: [],
    todos: [],
  });
  save();
  updateNav();
  showPage('trainee-' + (STATE.traineeId - 1));
}

function removeTrainee(id) {
  if (!confirm('Remove this trainee?')) return;
  STATE.trainees = STATE.trainees.filter(t => t.id !== id);
  save();
  showPage('home');
}

function addCallReview(traineeId) {
  const name = prompt('Lead name:');
  if (!name) return;
  const notes = prompt('Review notes:');
  const tr = STATE.trainees.find(t => t.id === traineeId);
  if (tr) {
    tr.calls = tr.calls || [];
    tr.calls.push({
      id: STATE.noteId++,
      date: TODAY_DISPLAY,
      name,
      notes,
    });
    save();
    showPage('trainee-' + traineeId);
  }
}

function addTraineeTodo(traineeId, text) {
  if (!text.trim()) return;
  const tr = STATE.trainees.find(t => t.id === traineeId);
  if (tr) {
    tr.todos = tr.todos || [];
    tr.todos.push({ id: STATE.noteId++, text, done: false });
    save();
    showPage('trainee-' + traineeId);
  }
}

function toggleTraineeTodo(id, taskId) {
  const tasks = STATE.dailyTasks['trainee-' + id];
  if (!tasks) return;
  const task = tasks.find(t => t.id === taskId);
  if (task) task.done = !task.done;
  save();
  showPage('trainee-' + id);
}

// ── INIT ──
load();
const sidebar = document.getElementById('sidebar');
sidebar.innerHTML = `
  <div class="sidebar-section">Navigation</div>
  ${['home','notes','calendar','yaakov'].map(id => {
    const labels = {home:'Home',notes:'Notes',calendar:'Calendar',yaakov:'Yaakov'};
    return `<div class="sidebar-item ${currentPage === id ? 'active' : ''}" onclick="showPage('${id}')">${labels[id]}</div>`;
  }).join('')}
  <div class="sidebar-section" style="margin-top:16px">Trainees</div>
  ${STATE.trainees.map(t => `
    <div class="sidebar-item ${currentPage === 'trainee-'+t.id ? 'active' : ''}" onclick="showPage('trainee-${t.id}')">${esc(t.name)}</div>
  `).join('')}
  <div class="sidebar-item" onclick="addTrainee()" style="color:var(--accent);border-left-color:var(--accent);">+ add trainee</div>
`;

showPage('home');
window.addEventListener('beforeunload', save);
</script>
